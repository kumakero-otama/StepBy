<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>Road Info Detail</title>
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="road_info_detail.css" />
  </head>
  <body>
    <header class="app-bar">
      <h1 class="app-bar-title">Road Info Detail</h1>
      <div class="app-bar-actions" aria-label="App menu">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="Home">
          <img src="../assets/buttons/home.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../profile/Index.html" aria-label="Profile">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../otasuke/Index.html" aria-label="Settings">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>
    <!-- 道情報Details（Tags・Post・画像）の表示画面 -->
    <main class="detail-wrap">
      <div class="detail-main">
        <p id="detail-error" class="detail-error hidden"></p>
        <section id="detail-content" class="hidden">
          <div class="tags-block">
            <h2 class="section-label">Tags</h2>
            <ul id="tags-list" class="tags-list"></ul>
          </div>

          <div class="posts-head">
            <h2 class="section-label">Post <span id="post-count" class="post-count">(0 total)</span></h2>
          </div>

          <div id="posts-list" class="posts-list"></div>
        </section>
        <section id="detail-loading">Loading...</section>
      </div>

      <!-- 画面下部の固定操作ボタン -->
      <div class="bottom-actions">
        <button id="post-self-btn" class="btn btn-primary" type="button">Post here too</button>
        <button id="delete-point-btn" class="btn btn-danger hidden" type="button">Delete this road info</button>
        <button id="back-btn" class="btn" type="button">Back</button>
      </div>
      <!-- 共通バージョン表示 -->
    </main>
    <div id="comment-modal" class="comment-modal hidden" role="dialog" aria-modal="true" aria-label="Post comment">
      <div class="comment-window">
        <div class="comment-window-head">
          <div class="comment-window-title">Post comment</div>
          <button id="comment-close-btn" class="comment-close-btn" type="button" aria-label="Close">×</button>
        </div>
        <div class="comment-window-body">
          <label class="comment-label" for="comment-body-input">Body</label>
          <textarea
            id="comment-body-input"
            class="comment-body-input"
            placeholder="Enter the comment body here"
          ></textarea>

          <div class="comment-label">Add Tags (optional)</div>
          <section class="comment-tag-panel" aria-label="Tag selection">
            <input
              id="comment-tag-search"
              class="comment-tag-search"
              type="text"
              placeholder="Search or add..."
              enterkeyhint="done"
            />
            <div id="comment-tag-selected" class="comment-tag-selected"></div>
            <div id="comment-tag-list" class="comment-tag-list"></div>
            <div class="comment-complete-tag-wrap">
              <button
                id="comment-complete-tag-btn"
                class="comment-complete-tag-btn"
                type="button"
                data-tag-id="complete"
                data-confirm-message="Road info with this tag will be hidden. Are you sure?"
              >
                Complete Tag
              </button>
            </div>
          </section>

          <div class="comment-label">Upload Image</div>
          <div class="comment-upload-buttons">
            <button id="comment-photo-library-btn" class="btn" type="button">Photo Library</button>
            <button id="comment-camera-btn" class="btn" type="button">Take Photo</button>
          </div>
          <div id="comment-image-preview" class="comment-image-preview">
            <div class="comment-image-empty">Selected images are shown here</div>
          </div>

          <input
            id="comment-photo-library-input"
            class="comment-file-input-hidden"
            type="file"
            accept="image/*"
            multiple
          />
          <input
            id="comment-camera-input"
            class="comment-file-input-hidden"
            type="file"
            accept="image/*"
            capture="environment"
          />
        </div>
        <div class="comment-window-foot">
          <button id="comment-submit-btn" class="btn btn-primary" type="button">Post</button>
        </div>
      </div>
    </div>
    <div id="comment-submit-loading" class="comment-submit-loading hidden" aria-live="polite" aria-busy="true">
      <div class="comment-submit-text">Posting comment...</div>
      <div class="comment-submit-spinner" aria-hidden="true"></div>
    </div>
    <div id="comment-result-modal" class="comment-result-modal hidden" role="dialog" aria-modal="true" aria-label="Comment post result">
      <div class="comment-result-panel">
        <p id="comment-result-message" class="comment-result-message"></p>
        <div class="comment-result-actions">
          <button id="comment-result-ok-btn" class="btn" type="button">OK</button>
        </div>
      </div>
    </div>
    <script src="../config.js"></script>
    <script src="../auth/token_client.js"></script>
    <script src="road_info_detail.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
