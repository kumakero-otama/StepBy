<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>驕捺ュ蝣ｱ縺ｮ謚慕ｨｿ 窶・StepBy</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .section+.section {
            margin-top: 20px;
        }

        /* Location card */
        .location-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .location-icon {
            width: 44px;
            height: 44px;
            background: var(--primary-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .location-icon i {
            color: var(--primary);
            font-size: 18px;
        }

        .location-text {
            flex: 1;
        }

        .location-text .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .location-text .coords {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 2px;
            font-family: 'Inter', monospace;
        }

        /* Tag grid */
        .tag-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* Photo upload */
        .photo-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-gray);
            position: relative;
            overflow: hidden;
        }

        .photo-upload-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(46, 158, 143, 0.03), rgba(255, 184, 71, 0.03));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-upload-area:active {
            border-color: var(--primary);
            background: var(--primary-bg);
            transform: scale(0.98);
        }

        .photo-upload-area:active::before {
            opacity: 1;
        }

        .photo-upload-area i {
            font-size: 30px;
            color: var(--primary-light);
            margin-bottom: 8px;
            display: block;
        }

        .photo-upload-area p {
            font-size: 13px;
            color: var(--text-mid);
            font-weight: 500;
        }

        .photo-upload-area small {
            font-size: 11px;
            color: var(--text-light);
        }

        .photo-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        /* Detail input */
        .detail-input {
            width: 100%;
            min-height: 100px;
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-dark);
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg-white);
        }

        .detail-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(46, 158, 143, 0.1);
        }

        .detail-input::placeholder {
            color: var(--text-light);
        }

        .submit-area {
            padding: 0 16px 16px;
            flex-shrink: 0;
        }

        /* hidden file inputs */
        .file-hidden {
            display: none;
        }

        /* Photo buttons */
        .photo-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-white);
            font-size: 13px;
            font-family: inherit;
            color: var(--text-mid);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: border-color 0.15s;
        }

        .photo-btn:active {
            border-color: var(--primary);
        }

        .photo-btn i {
            font-size: 16px;
            color: var(--primary);
        }
    </style>
</head>

<body>

            <h1>驕捺ュ蝣ｱ縺ｮ謚慕ｨｿ</h1>
        
<div class="header-actions">

                            <button class="header-action-btn" id="settings-toggle" aria-label="險ｭ螳・>
                                <i class="fas fa-cog"></i>

        <!-- Content -->

                            <div class="coords" id="location-coords">荳ｭ蠢・ｺｧ讓・ Lat --, Lng --</div>

            <!-- Tags -->
            <div class="section">

                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="audio_signal_no_sound"
                            hidden><i class="fas fa-volume-xmark"></i> 髻ｳ縺碁ｳｴ繧峨↑縺・ｿ｡蜿ｷ讖・/label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="push_button_signal"

                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="sensor_signal" hidden><i

                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="timed_signal" hidden><i

                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="crosswalk" hidden><i

                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="degraded_tactile" hidden><i

                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="blocked_tactile" hidden><i

                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="footbridge_stairs"
                            hidden><i class="fas fa-stairs"></i> 豁ｩ驕捺ｩ九・髫取ｮｵ縺ｮ蜃ｺ蜈･蜿｣</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="footbridge_elevator"
                            hidden><i class="fas fa-elevator"></i> 豁ｩ驕捺ｩ九・繧ｨ繝ｬ繝吶・繧ｿ繝ｼ縺ｮ蜃ｺ蜈･蜿｣</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="footbridge_slope" hidden><i
                            class="fas fa-wheelchair-move"></i> 豁ｩ驕捺ｩ九・繧ｹ繝ｭ繝ｼ繝励・蜃ｺ蜈･蜿｣</label>

                <textarea class="detail-input" id="detail-input" placeholder="縺薙・蝣ｴ謇縺ｫ縺､縺・※荳險繝｡繝｢繧呈嶌縺・※縺上□縺輔＞..."></textarea>

            <!-- Photos -->

                <div class="photo-upload-area" id="photo-upload-area">
                    <i class="fas fa-cloud-arrow-up"></i>
                    <p>繧ｿ繝・・縺励※蜀咏悄繧帝∈謚・/p>
                    <small>JPG, PNG・域怙螟ｧ10MB・・/small>
                </div>

                    <button class="photo-btn" id="photo-library-btn"><i class="fas fa-images"></i> 繝ｩ繧､繝悶Λ繝ｪ</button>

        <!-- Bottom Nav -->

            <a href="../map/Index.html" class="nav-item "><i class="fas fa-map"></i><span>繝槭ャ繝・/span></a>
            <a href="../post_road/Index.html" class="nav-item active"><i class="fas fa-plus-circle"></i><span>謚慕ｨｿ</span></a>

    <script>
        const API_BASE = "https://barrierfree-map.loophole.site";
        // --- URL params ---
        const params = new URLSearchParams(window.location.search);

        const lat = params.get("lat");
        const lng = params.get("lng");
        const locationCoordsEl = document.getElementById("location-coords");
        if (lat && lng) {
            locationCoordsEl.textContent = `荳ｭ蠢・ｺｧ讓・ Lat ${Number(lat).toFixed(6)}, Lng ${Number(lng).toFixed(6)}`;
        }

        // --- PRO check: 隧ｳ邏ｰ谺・・蛻ｶ蠕｡ ---
        const isPro = localStorage.getItem('UI1_isPro') === 'true';
        const detailInput = document.getElementById('detail-input');
        const proBadge = document.getElementById('pro-badge');
        const proLockMsg = document.getElementById('pro-lock-msg');
        if (!isPro) {
            // 髱霸RO縺ｯ繝・く繧ｹ繝医お繝ｪ繧｢繧堤┌蜉ｹ蛹・
            detailInput.disabled = true;
            detailInput.placeholder = '白 PRO繧｢繧ｫ繧ｦ繝ｳ繝磯剞螳・;
            detailInput.style.background = '#F5F7FA';
            detailInput.style.color = '#B0BEC5';
            detailInput.style.cursor = 'not-allowed';
            proBadge.style.display = 'inline-block';
            proLockMsg.style.display = 'block';
            // 謚慕ｨｿ繝懊ち繝ｳ繧ゅげ繝ｬ繝ｼ繧｢繧ｦ繝・
            const submitBtn = document.getElementById('submit-btn');
            if (submitBtn) {
                submitBtn.style.background = '#B0BEC5';
                submitBtn.style.cursor = 'not-allowed';
                submitBtn.innerHTML = '<i class="fas fa-lock"></i> PRO繧｢繧ｫ繧ｦ繝ｳ繝磯剞螳・;
            }
        }

        // --- Tag selection ---
        document.querySelectorAll("#tag-grid .tag-chip").forEach((chip) => {
            chip.addEventListener("click", () => {
                const checkbox = chip.querySelector('input[type="checkbox"]');
                // The checkbox toggles automatically via label click
                chip.classList.toggle("selected", checkbox.checked);
            });
        });

        // --- Photo handling ---
        const photoPreviewEl = document.getElementById("photo-preview");
        const photoLibraryInput = document.getElementById("photo-library-input");
        const photoCameraInput = document.getElementById("photo-camera-input");
        const selectedFiles = [];

        function addFiles(files) {
            Array.from(files).forEach((file) => {
                if (!file.type.startsWith("image/")) return;
                selectedFiles.push(file);
                const img = document.createElement("img");
                img.src = URL.createObjectURL(file);
                photoPreviewEl.appendChild(img);
            });
        }

        document.getElementById("photo-upload-area").addEventListener("click", () => {
            photoLibraryInput.click();
        });
        document.getElementById("photo-library-btn").addEventListener("click", () => {
            photoLibraryInput.click();
        });
        document.getElementById("photo-camera-btn").addEventListener("click", () => {
            photoCameraInput.click();
        });
        photoLibraryInput.addEventListener("change", () => { addFiles(photoLibraryInput.files); photoLibraryInput.value = ""; });
        photoCameraInput.addEventListener("change", () => { addFiles(photoCameraInput.files); photoCameraInput.value = ""; });

        // --- Back button ---
        document.getElementById("back-btn").addEventListener("click", () => {
            if (window.history.length > 1) { window.history.back(); return; }
            window.location.assign("../map/Index.html");
        });

        // --- Submit ---
        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error("file_read_failed"));
                reader.readAsDataURL(file);
            });
        }

        document.getElementById("submit-btn").addEventListener("click", async () => {
            const submitBtn = document.getElementById("submit-btn");

            // PRO髯仙ｮ壹メ繧ｧ繝・け
            if (!isPro) {
                alert("白 驕捺ュ蝣ｱ縺ｮ謚慕ｨｿ縺ｯPRO繧｢繧ｫ繧ｦ繝ｳ繝磯剞螳壹〒縺吶・n繝励Ο繝輔ぅ繝ｼ繝ｫ邱ｨ髮・・繝ｼ繧ｸ縺九ｉPRO縺ｫ蛻・ｊ譖ｿ縺医※縺上□縺輔＞縲・);
                return;
            }

            const detail = document.getElementById("detail-input").value.trim();
            const checkedTags = Array.from(document.querySelectorAll('#tag-grid input[type="checkbox"]:checked'))
                .map((cb) => cb.value);

            if (!detail && selectedFiles.length < 1 && checkedTags.length < 1) {
                alert("繧ｿ繧ｰ縲∵悽譁・∫判蜒上・縺・★繧後°繧貞・蜉帙＠縺ｦ縺上□縺輔＞縲・);
                return;
            }


            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> 謚慕ｨｿ荳ｭ...';

            try {
                const images = [];
                for (const file of selectedFiles) {
                    const dataUrl = await fileToDataUrl(file);
                    images.push({ name: file.name, dataUrl });
                }

                const body = {
                    lat: lat ? Number(lat) : null,
                    lng: lng ? Number(lng) : null,
                    tags: checkedTags,
                    detail,
                    images,
                };

                const res = await fetch(`${API_BASE}/api/road-info`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });

                if (!res.ok) throw new Error(`submit failed: ${res.status}`);

                alert("謚慕ｨｿ縺悟ｮ御ｺ・＠縺ｾ縺励◆・・);
                window.location.assign("../map/Index.html");
            } catch (err) {
                alert(`謚慕ｨｿ縺ｫ螟ｱ謨励＠縺ｾ縺励◆: ${err.message}`);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 謚慕ｨｿ縺吶ｋ';
            }
        });
    </script>
<script src="../i18n.js"></script>
<script src="../common.js"></script>
</body>
