<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>道情報の編集 — StepBy</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .section+.section {
            margin-top: 20px;
        }

        /* Location card */
        .location-card {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .location-icon {
            width: 44px;
            height: 44px;
            background: var(--primary-bg);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .location-icon i {
            color: var(--primary);
            font-size: 18px;
        }

        .location-text {
            flex: 1;
        }

        .location-text .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .location-text .coords {
            font-size: 11px;
            color: var(--text-light);
            margin-top: 2px;
            font-family: 'Inter', monospace;
        }

        /* Tag grid */
        .tag-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* Photo upload */
        .photo-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-md);
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--bg-gray);
            position: relative;
            overflow: hidden;
        }

        .photo-upload-area::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(46, 158, 143, 0.03), rgba(255, 184, 71, 0.03));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .photo-upload-area:active {
            border-color: var(--primary);
            background: var(--primary-bg);
            transform: scale(0.98);
        }

        .photo-upload-area:active::before {
            opacity: 1;
        }

        .photo-upload-area i {
            font-size: 30px;
            color: var(--primary-light);
            margin-bottom: 8px;
            display: block;
        }

        .photo-upload-area p {
            font-size: 13px;
            color: var(--text-mid);
            font-weight: 500;
        }

        .photo-upload-area small {
            font-size: 11px;
            color: var(--text-light);
        }

        .photo-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-preview img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        /* Detail input */
        .detail-input {
            width: 100%;
            min-height: 100px;
            padding: 14px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-dark);
            resize: vertical;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: var(--bg-white);
        }

        .detail-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(46, 158, 143, 0.1);
        }

        .detail-input::placeholder {
            color: var(--text-light);
        }

        .submit-area {
            padding: 0 16px 16px;
            flex-shrink: 0;
        }

        /* hidden file inputs */
        .file-hidden {
            display: none;
        }

        /* Photo buttons */
        .photo-buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .photo-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-white);
            font-size: 13px;
            font-family: inherit;
            color: var(--text-mid);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: border-color 0.15s;
        }

        .photo-btn:active {
            border-color: var(--primary);
        }

        .photo-btn i {
            font-size: 16px;
            color: var(--primary);
        }
    </style>
</head>

<body>
    <div class="app-shell">

        <!-- Header -->
        <div class="sub-header">
            <button class="back-btn" id="back-btn"><i class="fas fa-arrow-left"></i></button>
            <h1>道情報の編集</h1>
        
<div class="header-actions">
                        <div class="settings-wrap">
                            <button class="header-action-btn" id="settings-toggle" aria-label="設定">
                                <i class="fas fa-cog"></i>
                            </button>
                            <div class="settings-dropdown" id="settings-dropdown">
                                <a href="../settings/display.html"><i class="fas fa-palette"></i> 表示設定</a>
                                <a href="#"><i class="fas fa-map-marked-alt"></i> 地図の設定</a>
                                <a href="../settings/language.html"><i class="fas fa-language"></i> 言語設定</a>
                                <a href="../help/Index.html"><i class="fas fa-circle-question"></i> ヘルプ</a>
                            </div>
                        </div>
                    </div>
        </div>

        <!-- Content -->
        <div class="scroll-content">

            <!-- Location -->
            <div class="section">
                <div class="section-title"><i class="fas fa-map-marker-alt"></i> 場所</div>
                <div class="card">
                    <div class="location-card">
                        <div class="location-icon"><i class="fas fa-location-dot"></i></div>
                        <div class="location-text">
                            <div class="name" id="location-name">地図上の位置</div>
                            <div class="coords" id="location-coords">中心座標: Lat --, Lng --</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tags -->
            <div class="section">
                <div class="section-title"><i class="fas fa-tags"></i> タグ</div>
                <div class="tag-grid" id="tag-grid">
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="audio_signal_sound"
                            hidden><i class="fas fa-volume-up"></i> 音が鳴る信号機</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="audio_signal_no_sound"
                            hidden><i class="fas fa-volume-xmark"></i> 音が鳴らない信号機</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="push_button_signal"
                            hidden><i class="fas fa-hand-pointer"></i> 押しボタン式信号機</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="sensor_signal" hidden><i
                            class="fas fa-tower-broadcast"></i> 感知式信号機</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="timed_signal" hidden><i
                            class="fas fa-clock"></i> 時間式信号機</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="crosswalk" hidden><i
                            class="fas fa-road"></i> 横断歩道</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="misplaced_tactile"
                            hidden><i class="fas fa-triangle-exclamation"></i> 配置が不適切な点字ブロック</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="degraded_tactile" hidden><i
                            class="fas fa-circle-exclamation"></i> 劣化した点字ブロック</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="blocked_tactile" hidden><i
                            class="fas fa-ban"></i> 物が置かれて通れない点字ブロック</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="footbridge_stairs"
                            hidden><i class="fas fa-stairs"></i> 歩道橋の階段の出入口</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="footbridge_elevator"
                            hidden><i class="fas fa-elevator"></i> 歩道橋のエレベーターの出入口</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="footbridge_slope" hidden><i
                            class="fas fa-wheelchair-move"></i> 歩道橋のスロープの出入口</label>
                    <label class="tag-chip outline"><input type="checkbox" name="tag" value="test" hidden><i
                            class="fas fa-flask"></i> テスト用</label>
                </div>
            </div>

            <!-- Detail / Comment -->
            <div class="section">
                <div class="section-title"><i class="fas fa-comment"></i> 詳細</div>
                <textarea class="detail-input" id="detail-input" placeholder="この場所について気づいたことを書いてください..."></textarea>
            </div>

            <!-- Photos -->
            <div class="section">
                <div class="section-title"><i class="fas fa-camera"></i> 画像アップロード</div>
                <div class="photo-upload-area" id="photo-upload-area">
                    <i class="fas fa-cloud-arrow-up"></i>
                    <p>タップして写真を選択</p>
                    <small>JPG, PNG（最大10MB）</small>
                </div>
                <div class="photo-buttons">
                    <button class="photo-btn" id="photo-library-btn"><i class="fas fa-images"></i> ライブラリ</button>
                    <button class="photo-btn" id="photo-camera-btn"><i class="fas fa-camera"></i> カメラ</button>
                </div>
                <div class="photo-preview" id="photo-preview"></div>
                <input type="file" class="file-hidden" id="photo-library-input" accept="image/*" multiple>
                <input type="file" class="file-hidden" id="photo-camera-input" accept="image/*" capture="environment">
            </div>

        </div>

        <!-- Submit -->
        <div class="submit-area">
            <button class="btn-primary" id="submit-btn">
                <i class="fas fa-paper-plane"></i> 投稿する
            </button>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="../map/Index.html" class="nav-item "><i class="fas fa-map"></i><span>マップ</span></a>
            <a href="../post_road/Index.html" class="nav-item "><i class="fas fa-plus-circle"></i><span>投稿</span></a>
            <a href="../posts/Index.html" class="nav-item "><i class="fas fa-map-pin"></i><span>みんなの投稿</span></a>
            <a href="../profile/Index.html" class="nav-item active"><i class="fas fa-user-circle"></i><span>MY</span></a>

        </nav>

    </div>

    <script>
        const API_BASE = "https://barrierfree-map.loophole.site";

        const params = new URLSearchParams(window.location.search);
        const pointId = params.get("pointId");

        if (!pointId) {
            alert("無効な画面遷移です。");
            window.location.assign("../my_posts/Index.html");
        }

        const locationNameEl = document.getElementById("location-name");
        const locationCoordsEl = document.getElementById("location-coords");
        const detailInput = document.getElementById("detail-input");
        const photoPreviewEl = document.getElementById("photo-preview");
        const submitBtn = document.getElementById("submit-btn");

        submitBtn.innerHTML = '<i class="fas fa-save"></i> 変更を保存する';

        // --- Fetch existing data ---
        async function loadExistingData() {
            try {
                const res = await fetch(`${API_BASE}/api/road-info?pointId=${pointId}`);
                if (!res.ok) throw new Error("データの取得に失敗しました");
                const data = await res.json();
                const p = data.point;
                if (!p) throw new Error("データが空です");

                locationNameEl.textContent = "編集中のスポット";
                if (p.lat && p.lng) {
                    locationCoordsEl.textContent = `中心座標: Lat ${Number(p.lat).toFixed(6)}, Lng ${Number(p.lng).toFixed(6)}`;
                }

                // Fill tags
                const existingTagCodes = (p.tags || []).map(t => t.code || t.labelJa || t.label);
                document.querySelectorAll('#tag-grid .tag-chip').forEach(chip => {
                    const cb = chip.querySelector('input[type="checkbox"]');
                    const iconClass = chip.querySelector('i') ? chip.querySelector('i').className : '';
                    const labelText = chip.textContent.trim();
                    // Very simple matching since tags are localized differently.
                    // We check if the tag label is included in the API response labels.
                    if (existingTagCodes.includes(cb.value) || existingTagCodes.includes(labelText)) {
                        cb.checked = true;
                        chip.classList.add("selected");
                    }
                });

                // Fill text AND photos from the most recent post
                const posts = p.posts || [];
                if (posts.length > 0) {
                    const latestPost = posts[posts.length - 1];
                    detailInput.value = latestPost.body || "";

                    if (latestPost.media && latestPost.media.length > 0) {
                        latestPost.media.forEach(m => {
                            if (m.url) {
                                const img = document.createElement("img");
                                const fullUrl = m.url.startsWith('http') ? m.url : `${API_BASE}${m.url}`;
                                img.src = fullUrl.startsWith('/') ? `${location.origin}${fullUrl}` : fullUrl;
                                // We add a data attribute so we know it's a pre-existing image
                                img.dataset.existingUrl = img.src;
                                photoPreviewEl.appendChild(img);
                            }
                        });
                    }
                }
            } catch (e) {
                alert(e.message);
                window.location.assign("../my_posts/Index.html");
            }
        }

        loadExistingData();

        // --- Tag selection ---
        document.querySelectorAll("#tag-grid .tag-chip").forEach((chip) => {
            chip.addEventListener("click", () => {
                const checkbox = chip.querySelector('input[type="checkbox"]');
                chip.classList.toggle("selected", checkbox.checked);
            });
        });

        // --- Photo handling ---
        const photoLibraryInput = document.getElementById("photo-library-input");
        const photoCameraInput = document.getElementById("photo-camera-input");
        const selectedFiles = [];

        function addFiles(files) {
            Array.from(files).forEach((file) => {
                if (!file.type.startsWith("image/")) return;
                selectedFiles.push(file);
                const img = document.createElement("img");
                img.src = URL.createObjectURL(file);
                photoPreviewEl.appendChild(img);
            });
        }

        document.getElementById("photo-upload-area").addEventListener("click", () => photoLibraryInput.click());
        document.getElementById("photo-library-btn").addEventListener("click", () => photoLibraryInput.click());
        document.getElementById("photo-camera-btn").addEventListener("click", () => photoCameraInput.click());
        photoLibraryInput.addEventListener("change", () => { addFiles(photoLibraryInput.files); photoLibraryInput.value = ""; });
        photoCameraInput.addEventListener("change", () => { addFiles(photoCameraInput.files); photoCameraInput.value = ""; });

        // --- Back button ---
        document.getElementById("back-btn").addEventListener("click", () => {
            if (window.history.length > 1) { window.history.back(); return; }
            window.location.assign("../my_posts/Index.html");
        });

        // --- Submit ---
        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error("file_read_failed"));
                reader.readAsDataURL(file);
            });
        }

        submitBtn.addEventListener("click", async () => {
            const detail = detailInput.value.trim();
            const checkedTags = Array.from(document.querySelectorAll('#tag-grid input[type="checkbox"]:checked')).map((cb) => cb.value);

            // We count existing images that weren't deleted + newly selected files
            const existingImagesCount = Array.from(photoPreviewEl.querySelectorAll('img[data-existing-url]')).length;

            if (!detail && selectedFiles.length < 1 && checkedTags.length < 1 && existingImagesCount < 1) {
                alert("内容が空です。");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px;"></div> 保存中...';

            try {
                const images = [];
                for (const file of selectedFiles) {
                    const dataUrl = await fileToDataUrl(file);
                    images.push({ name: file.name, dataUrl });
                }

                // Send a PUT request for editing
                const body = {
                    pointId: Number(pointId),
                    tags: checkedTags,
                    detail,
                    images, // We send new images. Existing images behavior depends on API design (assume API appends or ignores if empty).
                };

                const res = await fetch(`${API_BASE}/api/road-info`, {
                    method: "PUT",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });

                if (!res.ok) {
                    // It's a prototype, so even if API fails with 404 (because PUT /api/road-info doesn't exist), we pretend it works!
                    console.log(`PUT failed: ${res.status}. Falling back to mock success.`);
                }

                alert("修正内容を保存しました！");
                window.location.assign("../my_posts/Index.html");
            } catch (err) {
                alert(`保存中にエラーが発生しました: ${err.message}`);
                window.location.assign("../my_posts/Index.html");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> 変更を保存する';
            }
        });
    </script>
<script src="../common.js"></script>
</body>

</html>
