<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>道情報の詳細 — StepBy</title>
    <link rel="manifest" href="../manifest.webmanifest">
    <meta name="theme-color" content="#2E9E8F">
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .section+.section {
            margin-top: 16px;
        }

        /* Section header */
        .section-header {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-header i {
            color: var(--primary);
        }

        /* Tag list */
        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* Post card */
        .post-card {
            background: var(--bg-gray);
            border-radius: var(--radius-sm);
            padding: 14px;
        }

        .post-card+.post-card {
            margin-top: 12px;
        }

        .post-head {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .post-meta {
            flex: 1;
        }

        .post-meta .date {
            font-size: 12px;
            color: var(--text-light);
        }

        .post-body {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-mid);
            margin-bottom: 8px;
        }

        .media-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .media-list img {
            width: 100%;
            max-width: 280px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        /* Action buttons */
        .action-btns {
            display: flex;
            gap: 10px;
            padding: 0 16px 16px;
            flex-shrink: 0;
        }

        .action-btns button {
            flex: 1;
        }

        /* Loading & Error */
        #detail-loading {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #detail-error {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: var(--danger);
            padding: 20px;
            text-align: center;
        }

        /* Comment modal */
        .comment-modal-body {
            max-height: 70vh;
            overflow-y: auto;
        }

        .comment-textarea {
            width: 100%;
            min-height: 80px;
            padding: 12px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            color: var(--text-dark);
            resize: vertical;
            outline: none;
            margin-bottom: 12px;
        }

        .comment-textarea:focus {
            border-color: var(--primary);
        }

        .comment-textarea::placeholder {
            color: var(--text-light);
        }

        .comment-photo-btns {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .comment-photo-btn {
            flex: 1;
            padding: 10px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-white);
            font-size: 12px;
            font-family: inherit;
            color: var(--text-mid);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .comment-photo-btn i {
            color: var(--primary);
        }

        .comment-image-preview {
            margin-bottom: 12px;
        }

        .comment-image-empty {
            font-size: 12px;
            color: var(--text-light);
            text-align: center;
            padding: 12px;
            background: var(--bg-gray);
            border-radius: var(--radius-sm);
        }

        .comment-image-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .comment-image-item {
            position: relative;
            width: 72px;
            height: 72px;
        }

        .comment-image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: var(--radius-sm);
        }

        .comment-image-remove-btn {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 20px;
            height: 20px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 20px;
            color: var(--text-light);
            cursor: pointer;
        }

        /* Submit loading */
        .comment-submit-loading {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(2px);
        }

        /* Result modal */
        .result-modal .modal-box {
            text-align: center;
        }

        .result-modal .result-msg {
            font-size: 15px;
            color: var(--text-dark);
            margin-bottom: 16px;
        }

        .file-hidden {
            display: none;
        }
    </style>

    <!-- Anti-Flicker overlay for Google Translate -->
    <script>
        if (localStorage.getItem('UI1_language') && localStorage.getItem('UI1_language') !== 'ja') {
            const overlay = document.createElement('div');
            overlay.id = 'gt-flicker-overlay';
            overlay.style.cssText = 'position:fixed; top:0; left:0; width:100vw; height:100vh; background:#fff; z-index:9999999; transition:opacity 0.4s ease; pointer-events:none;';
            document.documentElement.appendChild(overlay);
            
            const removeOverlay = () => {
                if(overlay.style.opacity === '0') return;
                overlay.style.opacity = '0';
                setTimeout(() => overlay.remove(), 400);
            };
            setTimeout(removeOverlay, 1500);
            const observer = new MutationObserver(() => {
                if (document.documentElement.classList.contains('translated-ltr')) {
                    removeOverlay();
                    observer.disconnect();
                }
            });
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
        }
    </script>
</head>

<body>
    <div class="app-shell">

        <!-- Header (3 buttons: map / settings / profile) -->
        <div class="sub-header">
            <button class="back-btn" id="back-btn"><i class="fas fa-arrow-left"></i></button>
            <h1>道情報の詳細</h1>
            <div class="header-actions">
                <a href="../map/Index.html" class="header-action-btn" aria-label="マップ">
                    <i class="fas fa-map"></i>
                </a>
                <details class="settings-wrap" id="settings-details">
                    <summary class="header-action-btn settings-toggle-summary" aria-label="設定">
                        <i class="fas fa-cog"></i>
                    </summary>
                    <div class="settings-dropdown" id="settings-dropdown">
                        <a href="../settings/display.html"><i class="fas fa-palette"></i> 表示設定</a>
                        <a href="../settings/language.html"><i class="fas fa-language"></i> 言語設定</a>
                        <a href="../help/Index.html"><i class="fas fa-circle-question"></i> ヘルプ</a>
                    </div>
                </details>
                <a href="../profile/Index.html" class="header-action-btn" aria-label="プロフィール">
                    <i class="fas fa-user-circle"></i>
                </a>
            </div>
        </div>

        <!-- Loading -->
        <div id="detail-loading">
            <div class="spinner"></div>
        </div>

        <!-- Error -->
        <div id="detail-error" class="hidden"></div>

        <!-- Main Content -->
        <div id="detail-content" class="scroll-content hidden">

            <!-- Tags -->
            <div class="section">
                <div class="section-header"><i class="fas fa-tags"></i> タグ</div>
                <div class="card">
                    <div class="tag-list" id="tags-list"></div>
                </div>
            </div>

            <!-- Posts -->
            <div class="section">
                <div class="section-header"><i class="fas fa-comments"></i> 投稿 <span id="post-count">(全0件)</span></div>
                <div id="posts-list"></div>
            </div>

        </div>

        <!-- Action buttons -->
        <div class="action-btns" style="position:fixed; bottom:16px; left:50%; transform:translateX(-50%); width:100%; max-width:480px; padding:0 16px 8px; display:flex; gap:10px; z-index:200; background:linear-gradient(transparent, rgba(255,255,255,0.95) 30%); box-sizing:border-box;">
            <button class="btn-primary" id="post-self-btn" style="flex:1;">
                <i class="fas fa-plus"></i> コメントを追加
            </button>
        </div>

        <!-- Comment Modal -->
        <div id="comment-modal" class="modal-overlay hidden">
            <div class="modal-box" style="position: relative;">
                <button class="modal-close-btn" id="comment-close-btn"><i class="fas fa-times"></i></button>
                <h3>コメントを投稿</h3>
                <div class="comment-modal-body">
                    <textarea class="comment-textarea" id="comment-body-input" placeholder="コメントを入力..."></textarea>
                    <div class="comment-photo-btns">
                        <button class="comment-photo-btn" id="comment-photo-library-btn"><i class="fas fa-images"></i>
                            ライブラリ</button>
                        <button class="comment-photo-btn" id="comment-camera-btn"><i class="fas fa-camera"></i>
                            カメラ</button>
                    </div>
                    <div id="comment-image-preview" class="comment-image-preview"></div>
                    <button class="btn-primary" id="comment-submit-btn">
                        <i class="fas fa-paper-plane"></i> 投稿する
                    </button>
                </div>
            </div>
        </div>

        <!-- Submit Loading Overlay -->
        <div id="comment-submit-loading" class="comment-submit-loading hidden">
            <div class="spinner"></div>
        </div>

        <!-- Result Modal -->
        <div id="comment-result-modal" class="modal-overlay result-modal hidden">
            <div class="modal-box">
                <p class="result-msg" id="comment-result-message"></p>
                <button class="btn-primary" id="comment-result-ok-btn">OK</button>
            </div>
        </div>

        <!-- Hidden file inputs -->
        <input type="file" class="file-hidden" id="comment-photo-library-input" accept="image/*" multiple>
        <input type="file" class="file-hidden" id="comment-camera-input" accept="image/*" capture="environment">

    </div>

    <script src="../config.js"></script><script src="../token_client.js"></script><script src="road_info_detail.js?v=102"></script>
<script src="../common.js?v=102"></script>
</body>

</html>
