<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新規登録 — StepBy</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
            background: linear-gradient(135deg, #1a4a4a 0%, #2E9E8F 60%, #3BB49F 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #fff;
            border-radius: 24px;
            padding: 32px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .card h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1A2B3C;
            margin-bottom: 6px;
        }
        .card p.sub {
            font-size: 13px;
            color: #5A6B7E;
            margin-bottom: 24px;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #1A2B3C;
            margin-bottom: 6px;
        }
        .field input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #E8ECF0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .field input[type="text"]:focus { border-color: #2E9E8F; }
        .icon-preview-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
        }
        .icon-preview {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #E8ECF0;
            display: none;
        }
        .btn-file {
            padding: 10px 18px;
            border-radius: 12px;
            border: 1.5px solid #E8ECF0;
            background: #F5F7FA;
            font-size: 13px;
            cursor: pointer;
            color: #1A2B3C;
            font-weight: 600;
        }
        .agreement-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #5A6B7E;
        }
        .agreement-row a { color: #2E9E8F; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2E9E8F, #3BB49F);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; }
        #status-msg {
            text-align: center;
            font-size: 13px;
            margin-top: 12px;
            color: #e74c3c;
            min-height: 20px;
        }
    </style>

    <!-- Anti-Flicker for Google Translate -->
    <script>
        if (localStorage.getItem('UI1_language') && localStorage.getItem('UI1_language') !== 'ja') {
            document.documentElement.style.opacity = '0';
            document.documentElement.style.transition = 'opacity 0.4s ease';
            setTimeout(() => { document.documentElement.style.opacity = '1'; }, 1500);
            const observer = new MutationObserver((mutations) => {
                if (document.documentElement.classList.contains('translated-ltr')) {
                    document.documentElement.style.opacity = '1';
                    observer.disconnect();
                }
            });
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
        }
    </script>
</head>
<body>
    <div class="card">
        <h1>🎉 アカウント登録</h1>
        <p class="sub">アカウント名とアイコン画像を設定してください</p>

        <div class="field">
            <label for="username">アカウント名</label>
            <input type="text" id="username" placeholder="例: たろう" maxlength="50">
        </div>

        <div class="field">
            <label>アイコン画像</label>
            <div class="icon-preview-wrap">
                <img id="icon-preview" class="icon-preview" alt="プレビュー">
                <label class="btn-file">
                    <i class="fas fa-image"></i> 画像を選ぶ
                    <input type="file" id="icon-input" accept="image/*" style="display:none">
                </label>
            </div>
        </div>

        <div class="agreement-row">
            <input type="checkbox" id="agree-checkbox">
            <label for="agree-checkbox"><a href="../help/Index.html" target="_blank">利用規約</a>に同意します</label>
        </div>

        <button class="btn-submit" id="btn-submit" disabled>登録する</button>
        <p id="status-msg"></p>
    </div>

    <script src="../config.js"></script>
    <script src="../token_client.js"></script>
    <script>
        const API_BASE = window.APP_CONFIG ? window.APP_CONFIG.API_BASE_URL : 'https://barrierfree-map.loophole.site';
        const PENDING_KEY = 'stepby_pending_id_token';

        const usernameInput = document.getElementById('username');
        const iconInput = document.getElementById('icon-input');
        const iconPreview = document.getElementById('icon-preview');
        const agreeCheckbox = document.getElementById('agree-checkbox');
        const btnSubmit = document.getElementById('btn-submit');
        const statusMsg = document.getElementById('status-msg');

        function setStatus(msg, isError = true) {
            statusMsg.textContent = msg;
            statusMsg.style.color = isError ? '#e74c3c' : '#2E9E8F';
        }

        // IDトークン取得
        const pendingIdToken = sessionStorage.getItem(PENDING_KEY);
        if (!pendingIdToken) {
            setStatus('セッションが無効です。ログインページからやり直してください。');
            setTimeout(() => window.location.assign('../signup/Index.html'), 2000);
        }

        // アイコンプレビュー
        iconInput.addEventListener('change', () => {
            const file = iconInput.files && iconInput.files[0];
            if (!file) return;
            
            const cameraIcon = document.getElementById('icon-camera');
            if (cameraIcon) cameraIcon.style.display = 'none';
            
            // Fallback for non-image objects like HEIC that might get converted
            if (file.type.startsWith('image/') || file.name.match(/\.(jpg|jpeg|png|gif|heic)$/i)) {
                iconPreview.src = URL.createObjectURL(file);
                iconPreview.style.display = 'block';
                iconPreview.style.zIndex = '10';
            }
        });

        // 登録ボタン有効化
        agreeCheckbox.addEventListener('change', () => {
            btnSubmit.disabled = !agreeCheckbox.checked;
        });

        // 画像をDataURLに変換
        function fileToDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = () => reject(new Error('file_read_failed'));
                reader.readAsDataURL(file);
            });
        }

        // 登録実行
        btnSubmit.addEventListener('click', async () => {
            const username = usernameInput.value.trim();
            const iconFile = iconInput.files && iconInput.files[0];

            if (!username) { setStatus('アカウント名を入力してください。'); return; }
            if (!iconFile) { setStatus('アイコン画像を選択してください。'); return; }
            if (!agreeCheckbox.checked) { setStatus('利用規約に同意してください。'); return; }

            try {
                setStatus('登録中...', false);
                btnSubmit.disabled = true;

                const iconDataUrl = await fileToDataUrl(iconFile);

                const res = await fetch(`${API_BASE}/auth/google/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id_token: pendingIdToken,
                        username,
                        icon_data_url: iconDataUrl,
                    }),
                });

                const payload = await res.json().catch(() => ({}));

                if (!res.ok) {
                    const err = payload.error || 'signup_failed';
                    const msgs = {
                        'missing_username': 'アカウント名を入力してください。',
                        'username_too_long': 'アカウント名は50文字以内にしてください。',
                        'invalid_icon_image': '画像が不正です。別の画像をお試しください。',
                        'missing_icon_image': 'アイコン画像を選択してください。',
                        'account_not_found': 'トークンが無効です。ログイン画面からやり直してください。',
                        'invalid_token': 'Googleトークンが無効です。ログイン画面からやり直してください。',
                    };
                    setStatus(msgs[err] || `登録失敗: ${err}`);
                    btnSubmit.disabled = false;
                    return;
                }

                // 成功：トークン保存
                if (payload.access_token && window.AuthToken) {
                    window.AuthToken.setAccessToken(payload.access_token);
                }
                sessionStorage.removeItem(PENDING_KEY);
                setStatus('登録完了！地図画面へ移動します...', false);
                setTimeout(() => window.location.assign('../map/Index.html'), 800);

            } catch (e) {
                setStatus(`エラー: ${e.message}`);
                btnSubmit.disabled = false;
            }
        });
    </script>
</body>
</html>
