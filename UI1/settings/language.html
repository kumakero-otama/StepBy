<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>言語設定 — StepBy</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .settings-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .settings-card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            padding: 16px 16px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .settings-card-title i {
            color: var(--primary);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-bg);
            border-radius: 8px;
            font-size: 13px;
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
        }

        .lang-option:last-child {
            border-bottom: none;
        }

        .lang-option:active {
            background: var(--bg-gray);
        }

        .lang-option.selected {
            background: var(--primary-bg);
        }

        .lang-flag {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: var(--bg-gray);
        }

        .lang-info {
            flex: 1;
        }

        .lang-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .lang-native {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 2px;
        }

        .lang-check {
            color: var(--primary);
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .lang-option.selected .lang-check {
            opacity: 1;
        }

        /* ---- Submit Area ---- */
        .submit-area {
            padding: 0 16px 16px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-back {
            flex: 0 0 auto;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border);
            background: var(--bg-white);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:active {
            background: var(--bg-gray);
            transform: scale(0.97);
        }

        .lang-catchphrase {
            font-size: 11px;
            color: var(--primary);
            margin-top: 3px;
            font-style: italic;
        }
    </style>

    <!-- Anti-Flicker for Google Translate -->
    <script>
        if (localStorage.getItem('UI1_language') && localStorage.getItem('UI1_language') !== 'ja') {
            document.documentElement.style.opacity = '0';
            document.documentElement.style.transition = 'opacity 0.4s ease';
            setTimeout(() => { document.documentElement.style.opacity = '1'; }, 1500);
            const observer = new MutationObserver((mutations) => {
                if (document.documentElement.classList.contains('translated-ltr')) {
                    document.documentElement.style.opacity = '1';
                    observer.disconnect();
                }
            });
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
        }
    </script>
</head>

<body>
    <div class="app-shell">
        <!-- Header -->
        <header class="top-bar">
            <div class="top-bar-title">言語設定 / Language Settings</div>
            <div class="header-actions">
                <a href="../map/Index.html" class="header-action-btn" aria-label="マップ">
                    <i class="fas fa-map"></i>
                </a>
                <div class="settings-wrap">
                    <button class="header-action-btn" id="settings-toggle" aria-label="設定">
                        <i class="fas fa-cog"></i>
                    </button>
                    <div class="settings-dropdown" id="settings-dropdown">
                        <a href="../settings/display.html"><i class="fas fa-palette"></i> 表示設定</a>
                        <a href="../settings/language.html"><i class="fas fa-language"></i> 言語設定</a>
                        <a href="../help/Index.html"><i class="fas fa-circle-question"></i> ヘルプ</a>
                    </div>
                </div>
                <a href="../profile/Index.html" class="header-action-btn" aria-label="プロフィール">
                    <i class="fas fa-user-circle"></i>
                </a>
            </div>
        </header>

        <div class="scroll-content">
            <div class="settings-card">
                <div class="settings-card-title">
                    <i class="fas fa-language"></i> 言語
                </div>
                <div class="lang-option selected" data-lang="ja">
                    <div class="lang-flag">🇯🇵</div>
                    <div class="lang-info"><div class="lang-name">日本語</div><div class="lang-native">Japanese</div></div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
                <div class="lang-option" data-lang="en">
                    <div class="lang-flag">🇺🇸</div>
                    <div class="lang-info"><div class="lang-name">English</div><div class="lang-native">英語</div></div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
                <div class="lang-option" data-lang="hi">
                    <div class="lang-flag">🇮🇳</div>
                    <div class="lang-info"><div class="lang-name">हिंदी</div><div class="lang-native">ヒンディー語</div></div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
                <div class="lang-option" data-lang="zh-CN">
                    <div class="lang-flag">🇨🇳</div>
                    <div class="lang-info"><div class="lang-name">中文</div><div class="lang-native">中国語</div></div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
                <div class="lang-option" data-lang="ko">
                    <div class="lang-flag">🇰🇷</div>
                    <div class="lang-info"><div class="lang-name">한국어</div><div class="lang-native">韓国語</div></div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
                <div class="lang-option" data-lang="es">
                    <div class="lang-flag">🇪🇸</div>
                    <div class="lang-info"><div class="lang-name">Español</div><div class="lang-native">スペイン語</div></div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
                <div class="lang-option" data-lang="fr">
                    <div class="lang-flag">🇫🇷</div>
                    <div class="lang-info"><div class="lang-name">Français</div><div class="lang-native">フランス語</div></div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
            </div>
        </div>

        <!-- Submit -->
        <div class="submit-area">
            <button class="btn-back" onclick="history.back()">戻る</button>
            <button class="btn-primary" style="flex:1">変更を保存</button>
        </div>

        <!-- Bottom Nav -->
        
    </div>

    <script src="../common.js"></script>
    <script>
        // 言語オプション選択
        document.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            });
        });

        // Google翻訳を直接起動
        function triggerGT(langCode) {
            const tryTrigger = () => {
                const combo = document.querySelector('.goog-te-combo');
                if (combo) { combo.value = langCode; combo.dispatchEvent(new Event('change')); }
            };
            setTimeout(tryTrigger, 500);
            setTimeout(tryTrigger, 1200);
        }

        // 保存ボタン
        document.querySelector('.btn-primary').addEventListener('click', () => {
            const selected = document.querySelector('.lang-option.selected');
            if (!selected) return;
            const lang = selected.dataset.lang;

            if (lang === 'ja') {
                localStorage.removeItem('UI1_language');
                // Remove Google Translate cookie forcefully across subdomains and paths
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=' + location.hostname;
                document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=.' + location.hostname;
            } else {
                localStorage.setItem('UI1_language', lang);
                // Set Google Translate cookie forcefully
                const val = `/ja/${lang}`;
                document.cookie = `googtrans=${val}; path=/`;
                document.cookie = `googtrans=${val}; path=/; domain=${location.hostname}`;
                document.cookie = `googtrans=${val}; path=/; domain=.${location.hostname}`;
            }

            const btn = document.querySelector('.btn-primary');
            btn.innerHTML = '<i class="fas fa-check"></i> Applied!';
            btn.style.background = '#27AE60';
            
            setTimeout(() => {
                const hash = lang === 'ja' ? '' : '#googtrans(ja|' + lang + ')';
                window.location.href = '../map/Index.html' + hash;
            }, 600);
        });
    </script>
</body>
</html>
