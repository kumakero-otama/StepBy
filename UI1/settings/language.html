<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>言語設定 — StepBy</title>
    <link rel="stylesheet" href="/StepBy/UI1/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            -webkit-overflow-scrolling: touch;
        }

        .settings-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .settings-card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
            padding: 16px 16px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .settings-card-title i {
            color: var(--primary);
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-bg);
            border-radius: 8px;
            font-size: 13px;
        }

        .lang-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
        }

        .lang-option:last-child {
            border-bottom: none;
        }

        .lang-option:active {
            background: var(--bg-gray);
        }

        .lang-option.selected {
            background: var(--primary-bg);
        }

        .lang-flag {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            background: var(--bg-gray);
        }

        .lang-info {
            flex: 1;
        }

        .lang-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
        }

        .lang-native {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 2px;
        }

        .lang-check {
            color: var(--primary);
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .lang-option.selected .lang-check {
            opacity: 1;
        }

        /* ---- Submit Area ---- */
        .submit-area {
            padding: 0 16px 16px;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn-back {
            flex: 0 0 auto;
            padding: 14px 24px;
            border-radius: var(--radius-md);
            border: 1.5px solid var(--border);
            background: var(--bg-white);
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-mid);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:active {
            background: var(--bg-gray);
            transform: scale(0.97);
        }

        .lang-catchphrase {
            font-size: 11px;
            color: var(--primary);
            margin-top: 3px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <!-- Header -->
        <header class="top-bar">
            <div class="top-bar-title">言語設定</div>
            <div class="top-bar-right">
                <a href="/StepBy/UI1/map/Index.html" class="top-bar-btn"><i class="fas fa-home"></i></a>
                <a href="/StepBy/UI1/profile/Index.html" class="top-bar-btn"><i class="fas fa-user-circle"></i></a>
            </div>
        </header>

        <div class="scroll-content">
            <div class="settings-card">
                <div class="settings-card-title">
                    <i class="fas fa-language"></i> 言語
                </div>
                <div class="lang-option selected" data-lang="ja">
                    <div class="lang-flag">🇯🇵</div>
                    <div class="lang-info">
                        <div class="lang-name">日本語</div>
                        <div class="lang-native">Japanese</div>
                    </div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
                <div class="lang-option" data-lang="en">
                    <div class="lang-flag">🇺🇸</div>
                    <div class="lang-info">
                        <div class="lang-name">English</div>
                        <div class="lang-native">英語</div>
                    </div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
                <div class="lang-option" data-lang="hi">
                    <div class="lang-flag">🇮🇳</div>
                    <div class="lang-info">
                        <div class="lang-name">हिंदी</div>
                        <div class="lang-native">ヒンディー語</div>
                    </div>
                    <i class="fas fa-check-circle lang-check"></i>
                </div>
            </div>
        </div>

        <!-- Submit -->
        <div class="submit-area">
            <button class="btn-back" onclick="history.back()">戻る</button>
            <button class="btn-primary" style="flex:1">変更を保存</button>
        </div>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <a href="/StepBy/UI1/map/Index.html" class="nav-item "><i class="fas fa-map"></i><span>マップ</span></a>
            <a href="/StepBy/UI1/post_road/Index.html" class="nav-item "><i class="fas fa-plus-circle"></i><span>投稿</span></a>
            <a href="/StepBy/UI1/posts/Index.html" class="nav-item "><i class="fas fa-map-pin"></i><span>みんなの投稿</span></a>
            <a href="/StepBy/UI1/profile/Index.html" class="nav-item "><i class="fas fa-user-circle"></i><span>MY</span></a>
            <a href="/StepBy/UI1/settings/display.html" class="nav-item active"><i class="fas fa-cog"></i><span>設定</span></a>
        </nav>
    </div>

    <script>
        document.querySelectorAll('.lang-option').forEach(opt => {
            opt.addEventListener('click', () => {
                document.querySelectorAll('.lang-option').forEach(o => o.classList.remove('selected'));
                opt.classList.add('selected');
            });
        });
    </script>
</body>

</html>
