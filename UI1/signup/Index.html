<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ログイン — StepBy</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Google Sign-In SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        .login-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-white);
            position: relative;
            overflow: hidden;
        }

        /* Hero gradient background */
        .login-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px 20px;
            background: linear-gradient(160deg, #0d3535 0%, #1a5c5c 30%, #2E9E8F 65%, #4BDBB4 100%);
            position: relative;
            overflow: hidden;
        }

        /* Decorative orbs */
        .login-hero::before {
            content: '';
            position: absolute;
            top: -60px; right: -50px;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float1 7s ease-in-out infinite;
        }

        .login-hero::after {
            content: '';
            position: absolute;
            bottom: -40px; left: -30px;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,184,71,0.08) 0%, transparent 70%);
            animation: float1 9s ease-in-out infinite reverse;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(12px,-18px) scale(1.1); }
        }

        /* Logo */
        .login-logo {
            width: 88px; height: 88px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            animation: logoPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
            z-index: 1;
        }

        @keyframes logoPop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .login-title {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 6px;
            position: relative; z-index: 1;
            text-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .login-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 36px;
            position: relative; z-index: 1;
            text-align: center;
            line-height: 1.6;
        }

        /* Card panel */
        .login-card {
            background: var(--bg-white);
            border-radius: 28px 28px 0 0;
            padding: 32px 24px 20px;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.1);
            position: relative; z-index: 1;
            flex-shrink: 0;
        }

        .login-card-hint {
            font-size: 13px;
            color: var(--text-mid);
            text-align: center;
            margin-bottom: 20px;
        }

        /* Google button */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .btn-google:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-sm);
        }

        .btn-google svg {
            width: 22px; height: 22px;
            flex-shrink: 0;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 12px;
            color: var(--text-light);
            white-space: nowrap;
        }

        .login-note {
            font-size: 11px;
            color: var(--text-light);
            text-align: center;
            line-height: 1.6;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }

        .login-note a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Features list */
        .features-list {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 28px;
            position: relative; z-index: 1;
        }

        .feature-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .feature-pill-icon {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
        }

        .feature-pill span {
            font-size: 10px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-shell">
                <!-- 言語セレクター (Google Translate) -->
        <div id="google_translate_element" style="position:absolute;top:12px;right:12px;z-index:10;"></div>

        <!-- Hero -->
        <div class="login-hero">
            <div class="login-logo">
                <i class="fas fa-shoe-prints"></i>
            </div>
            <div class="login-title">StepBy</div>
            <div class="login-sub">バリアフリーの地図を<br>みんなで作ろう</div>

            <!-- Feature icons -->
            <div class="features-list">
                <div class="feature-pill">
                    <div class="feature-pill-icon"><i class="fas fa-map"></i></div>
                    <span>地図を確認</span>
                </div>
                <div class="feature-pill">
                    <div class="feature-pill-icon"><i class="fas fa-braille"></i></div>
                    <span>点字ブロック記録</span>
                </div>
                <div class="feature-pill">
                    <div class="feature-pill-icon"><i class="fas fa-camera"></i></div>
                    <span>道情報を投稿</span>
                </div>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <p class="login-card-hint">アカウントでログインしてください</p>

            <!-- Googleボタンはここにレンダリング -->
            <div id="google-signin-button" style="display:flex;justify-content:center;margin-bottom:4px;"></div>
            <p id="google-auth-status" style="text-align:center;font-size:13px;margin:8px 0;display:none;"></p>


            <div class="divider"><span>ゲストとして使う場合</span></div>

            <button class="btn-google" id="btn-guest" style="color:var(--text-mid); box-shadow:none; border-color:var(--border);">
                <i class="fas fa-map" style="color:var(--primary)"></i>
                ログインせずに地図を見る
            </button>

            <p class="login-note">
                ログインすることで<a href="#">利用規約</a>と<a href="#">プライバシーポリシー</a>に同意したことになります
            </p>
        </div>
    </div>

        <script src="../config.js"></script>
        <script src="../token_client.js"></script>
        <script src="../common.js"></script>
    <script>
        const GOOGLE_CLIENT_ID = '808129330394-dagp56961vbank89vi7bc50pp4u7mgv8.apps.googleusercontent.com';
        const statusEl = document.getElementById('google-auth-status');

        function setStatus(msg, isError) {
            if (!statusEl) return;
            statusEl.textContent = msg;
            statusEl.style.color = isError ? '#e74c3c' : '#2E9E8F';
            statusEl.style.display = msg ? 'block' : 'none';
        }

        // Google認証成功時のコールバック
        async function handleGoogleCredential(response) {
            const idToken = response && response.credential;
            if (!idToken) { setStatus('Google認証トークンの取得に失敗しました', true); return; }

            setStatus('Googleログインを確認中...');
            try {
                const res = await fetch(window.AppPath.toApi('/auth/google'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id_token: idToken }),
                });
                const payload = await res.json().catch(() => ({}));

                if (!res.ok) {
                    const err = payload.error || 'auth_failed';
                    setStatus(`ログイン失敗: ${err}`, true);
                    return;
                }

                // トークンを保存
                if (payload.access_token) {
                    window.AuthToken.setAccessToken(payload.access_token);
                }
                setStatus('ログイン成功！地図画面へ移動します...');
                setTimeout(() => window.location.assign('../map/Index.html'), 800);

            } catch (e) {
                setStatus(`ネットワークエラー: ${e.message}`, true);
            }
        }

        // Google Sign-In初期化
        function initGoogleSignIn() {
            if (!(window.google && window.google.accounts && window.google.accounts.id)) {
                setTimeout(initGoogleSignIn, 500);
                return;
            }
            window.google.accounts.id.initialize({
                client_id: GOOGLE_CLIENT_ID,
                callback: handleGoogleCredential,
            });
            // 公式ボタンをレンダリング
            const container = document.getElementById('google-signin-button');
            if (container) {
                window.google.accounts.id.renderButton(container, {
                    theme: 'outline', size: 'large', shape: 'pill',
                    text: 'signin_with', width: 300,
                });
            }
        }

        // ゲストボタン
        document.getElementById('btn-guest').addEventListener('click', () => {
            window.location.assign('../map/Index.html');
        });

        // すでにトークンがあればマップへ自動遷移
        if (window.AuthToken && window.AuthToken.getAccessToken()) {
            window.location.assign('../map/Index.html');
        } else {
            initGoogleSignIn();
        }
    </script>
</body>

</html>
