<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ログイン — StepBy</title>
    <link rel="stylesheet" href="../common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .login-shell {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            background: var(--bg-white);
            position: relative;
            overflow: hidden;
        }

        /* Hero gradient background */
        .login-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 28px 20px;
            background: linear-gradient(160deg, #0d3535 0%, #1a5c5c 30%, #2E9E8F 65%, #4BDBB4 100%);
            position: relative;
            overflow: hidden;
        }

        /* Decorative orbs */
        .login-hero::before {
            content: '';
            position: absolute;
            top: -60px; right: -50px;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: float1 7s ease-in-out infinite;
        }

        .login-hero::after {
            content: '';
            position: absolute;
            bottom: -40px; left: -30px;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,184,71,0.08) 0%, transparent 70%);
            animation: float1 9s ease-in-out infinite reverse;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(12px,-18px) scale(1.1); }
        }

        /* Logo */
        .login-logo {
            width: 88px; height: 88px;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: #fff;
            margin-bottom: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            animation: logoPop 0.6s cubic-bezier(0.34,1.56,0.64,1);
            position: relative;
            z-index: 1;
        }

        @keyframes logoPop {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .login-title {
            font-size: 26px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            margin-bottom: 6px;
            position: relative; z-index: 1;
            text-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }

        .login-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 36px;
            position: relative; z-index: 1;
            text-align: center;
            line-height: 1.6;
        }

        /* Card panel */
        .login-card {
            background: var(--bg-white);
            border-radius: 28px 28px 0 0;
            padding: 32px 24px 20px;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.1);
            position: relative; z-index: 1;
            flex-shrink: 0;
        }

        .login-card-hint {
            font-size: 13px;
            color: var(--text-mid);
            text-align: center;
            margin-bottom: 20px;
        }

        /* Google button */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px 20px;
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            color: var(--text-dark);
            cursor: pointer;
            box-shadow: var(--shadow-md);
            transition: all 0.2s;
            margin-bottom: 16px;
        }

        .btn-google:active {
            transform: scale(0.97);
            box-shadow: var(--shadow-sm);
        }

        .btn-google svg {
            width: 22px; height: 22px;
            flex-shrink: 0;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 12px;
            color: var(--text-light);
            white-space: nowrap;
        }

        .login-note {
            font-size: 11px;
            color: var(--text-light);
            text-align: center;
            line-height: 1.6;
            padding-bottom: env(safe-area-inset-bottom, 12px);
        }

        .login-note a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Features list */
        .features-list {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 28px;
            position: relative; z-index: 1;
        }

        .feature-pill {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .feature-pill-icon {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #fff;
        }

        .feature-pill span {
            font-size: 10px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-shell">
        <!-- Hero -->
        <div class="login-hero">
            <div class="login-logo">
                <i class="fas fa-shoe-prints"></i>
            </div>
            <div class="login-title">StepBy</div>
            <div class="login-sub">バリアフリーの地図を<br>みんなで作ろう</div>

            <!-- Feature icons -->
            <div class="features-list">
                <div class="feature-pill">
                    <div class="feature-pill-icon"><i class="fas fa-map"></i></div>
                    <span>地図を確認</span>
                </div>
                <div class="feature-pill">
                    <div class="feature-pill-icon"><i class="fas fa-braille"></i></div>
                    <span>点字ブロック記録</span>
                </div>
                <div class="feature-pill">
                    <div class="feature-pill-icon"><i class="fas fa-camera"></i></div>
                    <span>道情報を投稿</span>
                </div>
            </div>
        </div>

        <!-- Login Card -->
        <div class="login-card">
            <p class="login-card-hint">アカウントでログインしてください</p>

            <button class="btn-google" id="btn-google-login">
                <!-- Google logo SVG -->
                <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Googleでログイン
            </button>

            <div class="divider"><span>ゲストとして使う場合</span></div>

            <button class="btn-google" id="btn-guest" style="color:var(--text-mid); box-shadow:none; border-color:var(--border);">
                <i class="fas fa-map" style="color:var(--primary)"></i>
                ログインせずに地図を見る
            </button>

            <p class="login-note">
                ログインすることで<a href="#">利用規約</a>と<a href="#">プライバシーポリシー</a>に同意したことになります
            </p>
        </div>
    </div>

    <script>
        document.getElementById('btn-google-login').addEventListener('click', () => {
            window.location.assign('/StepBy/UI1/map/Index.html');
        });
        document.getElementById('btn-guest').addEventListener('click', () => {
            window.location.assign('/StepBy/UI1/map/Index.html');
        });
    </script>
</body>

</html>
