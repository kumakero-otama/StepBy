<!doctype html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>सड़क जानकारी विवरण</title>
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="road_info_detail.css" />
  </head>
  <body>
    <header class="app-bar">
      <h1 class="app-bar-title">सड़क जानकारी विवरण</h1>
      <div class="app-bar-actions" aria-label="ऐप मेनू">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="होम">
          <img src="../assets/buttons/home.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../profile/Index.html" aria-label="प्रोफ़ाइल">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../otasuke/Index.html" aria-label="सेटिंग्स">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>
    <!-- 道情報Details（टैग・Post・画像）の表示画面 -->
    <main class="detail-wrap">
      <div class="detail-main">
        <p id="detail-error" class="detail-error hidden"></p>
        <section id="detail-content" class="hidden">
          <div class="tags-block">
            <h2 class="section-label">टैग</h2>
            <ul id="tags-list" class="tags-list"></ul>
          </div>

          <div class="posts-head">
            <h2 class="section-label">पोस्ट <span id="post-count" class="post-count">(कुल 0)</span></h2>
          </div>

          <div id="posts-list" class="posts-list"></div>
        </section>
        <section id="detail-loading">लोड हो रहा है...</section>
      </div>

      <!-- 画面下部の固定操作ボタン -->
      <div class="bottom-actions">
        <button id="post-self-btn" class="btn btn-primary" type="button">यहां भी पोस्ट करें</button>
        <button id="back-btn" class="btn" type="button">वापस</button>
      </div>
      <!-- 共通バージョン表示 -->
    </main>
    <div id="comment-modal" class="comment-modal hidden" role="dialog" aria-modal="true" aria-label="टिप्पणी पोस्ट करें">
      <div class="comment-window">
        <div class="comment-window-head">
          <div class="comment-window-title">टिप्पणी पोस्ट करें</div>
          <button id="comment-close-btn" class="comment-close-btn" type="button" aria-label="बंद करें">×</button>
        </div>
        <div class="comment-window-body">
          <label class="comment-label" for="comment-body-input">विवरण</label>
          <textarea
            id="comment-body-input"
            class="comment-body-input"
            placeholder="टिप्पणी का विवरण यहां लिखें"
          ></textarea>

          <div class="comment-label">छवि अपलोड</div>
          <div class="comment-upload-buttons">
            <button id="comment-photo-library-btn" class="btn" type="button">फोटो लाइब्रेरी</button>
            <button id="comment-camera-btn" class="btn" type="button">फोटो लें</button>
          </div>
          <div id="comment-image-preview" class="comment-image-preview">
            <div class="comment-image-empty">चयनित छवियां यहां दिखाई जाएंगी</div>
          </div>

          <input
            id="comment-photo-library-input"
            class="comment-file-input-hidden"
            type="file"
            accept="image/*"
            multiple
          />
          <input
            id="comment-camera-input"
            class="comment-file-input-hidden"
            type="file"
            accept="image/*"
            capture="environment"
          />
        </div>
        <div class="comment-window-foot">
          <button id="comment-submit-btn" class="btn btn-primary" type="button">पोस्ट</button>
        </div>
      </div>
    </div>
    <div id="comment-submit-loading" class="comment-submit-loading hidden" aria-live="polite" aria-busy="true">
      <div class="comment-submit-text">टिप्पणी पोस्ट की जा रही है...</div>
      <div class="comment-submit-spinner" aria-hidden="true"></div>
    </div>
    <div id="comment-result-modal" class="comment-result-modal hidden" role="dialog" aria-modal="true" aria-label="टिप्पणी पोस्ट परिणाम">
      <div class="comment-result-panel">
        <p id="comment-result-message" class="comment-result-message"></p>
        <div class="comment-result-actions">
          <button id="comment-result-ok-btn" class="btn" type="button">ठीक है</button>
        </div>
      </div>
    </div>
    <script src="../config.js"></script>
    <script src="../auth/token_client.js"></script>
    <script src="road_info_detail.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
