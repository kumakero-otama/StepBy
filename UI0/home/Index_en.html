<!-- このファイルは ホーム画面の英語マークアップを定義する。 -->
﻿<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>HTML Sandbox</title>
    <meta name="theme-color" content="#222222" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="../style.css" />
    <style>
      body.auth-pending {
        visibility: hidden;
      }
    </style>
    <script src="../config.js"></script>
    <script src="../auth/token_client.js"></script>
    <script>
      (async () => {
        const authFetch = window.AuthToken && typeof window.AuthToken.authFetch === "function"
          ? window.AuthToken.authFetch
          : fetch;
        const getAccessToken = window.AuthToken && typeof window.AuthToken.getAccessToken === "function"
          ? window.AuthToken.getAccessToken
          : () => "";
        const isTemporaryError = window.AuthToken && typeof window.AuthToken.isTemporaryError === "function"
          ? window.AuthToken.isTemporaryError
          : () => false;
        const clearAccessToken = window.AuthToken && typeof window.AuthToken.clearAccessToken === "function"
          ? window.AuthToken.clearAccessToken
          : () => {};

        try {
          const res = await authFetch("/auth/me", { cache: "no-store" });
          if (res.status === 401 || res.status === 403) {
            clearAccessToken();
            window.location.replace(AppPath.toApp("/auth/login.html"));
            return;
          }
          if (!res.ok) {
            window.location.replace(AppPath.toApp("/auth/login.html"));
            return;
          }
          const payload = await res.json();
          if (!payload || !payload.authenticated) {
            clearAccessToken();
            window.location.replace(AppPath.toApp("/auth/login.html"));
            return;
          }
          document.addEventListener("DOMContentLoaded", () => {
            document.body.classList.remove("auth-pending");
          }, { once: true });
        } catch (error) {
          if (isTemporaryError(error) && getAccessToken()) {
            document.addEventListener("DOMContentLoaded", () => {
              document.body.classList.remove("auth-pending");
            }, { once: true });
            return;
          }
          window.location.replace(AppPath.toApp("/auth/login.html"));
        }
      })();
    </script>
  </head>
  <body class="auth-pending">
    <header class="app-bar">
      <h1 class="app-bar-title">HOME</h1>
      <div class="app-bar-actions" aria-label="App menu">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="Home">
          <img src="../assets/buttons/map_white.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../profile/Index.html" aria-label="Profile">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../otasuke/Index.html" aria-label="Settings">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>
    <!-- Home画面の案内と遷移リンク -->
    <h1>It works!</h1>
    <p>Node.js HTTP server is running.</p>
    <p>Current time: <span id="clock">--:--:--</span></p>
    <p>
      <a class="btn" href="../analog/Index.html">Open analog clock</a>
    </p>
    <p>
      <a class="btn" href="../map/Index.html">Open draggable map</a>
    </p>
    <!-- 共通バージョン表示 -->
    <script src="app.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
