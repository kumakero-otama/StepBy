<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>Analog Clock</title>
    <meta name="theme-color" content="#222222" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="analog.css" />
  </head>
  <body>
    <header class="app-bar">
      <h1 class="app-bar-title">ANALOG CLOCK</h1>
      <div class="app-bar-actions" aria-label="App menu">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="Home">
          <img src="../assets/buttons/home.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../profile/Index.html" aria-label="Profile">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../otasuke/Index.html" aria-label="Settings">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>
    <!-- アナログ時計の表示領域 -->
    <main class="wrap">
      <h1>Analog Clock</h1>
      <div class="clock" aria-label="Analog clock">
        <div class="hand hour" id="hour-hand"></div>
        <div class="hand minute" id="minute-hand"></div>
        <div class="hand second" id="second-hand"></div>
        <div class="center-dot"></div>
      </div>
      <p><a class="btn" href="../home/Index.html">Back</a></p>
      <!-- 共通バージョン表示 -->
    </main>
    <script src="analog.js"></script>
    <script src="../config.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
