<!doctype html>
<!-- このファイルは おたすけ画面のヒンディー語マークアップを定義する。 -->
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>सेटिंग्स | Draggable Map</title>
    <link rel="stylesheet" href="../appbar.css" />
    <style>
      html,
      body {
        margin: 0;
        background: #f5f7fa;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      .app-bar {
        background: linear-gradient(135deg, #1a4a4a 0%, #2e9e8f 52%, #3bb49f 100%);
        box-shadow: 0 10px 28px rgba(30, 122, 109, 0.26);
        overflow: hidden;
      }

      .app-bar::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 12% 28%, rgba(255, 255, 255, 0.18), transparent 22%),
          radial-gradient(circle at 86% 18%, rgba(255, 255, 255, 0.12), transparent 20%),
          linear-gradient(110deg, transparent 22%, rgba(255, 255, 255, 0.1) 50%, transparent 78%);
        pointer-events: none;
      }

      .app-bar .app-bar-title {
        position: relative;
        z-index: 1;
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.08);
      }

      .app-bar-actions {
        position: relative;
        z-index: 1;
      }

      .app-bar-icon-link {
        background: rgba(255, 255, 255, 0.16);
        border: 1px solid rgba(255, 255, 255, 0.22);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(6px);
      }

      .app-bar-spacer {
        background: linear-gradient(180deg, rgba(46, 158, 143, 0.12), rgba(46, 158, 143, 0));
      }

      .settings-wrap {
        width: min(860px, calc(100vw - 24px));
        margin: 0 auto;
        padding: 18px 0 28px;
      }

      .settings-card {
        display: grid;
        gap: 14px;
      }

      .accordion-item {
        border: 1px solid #e4e8ed;
        border-radius: 22px;
        background: #fff;
        overflow: hidden;
        box-shadow: 0 10px 28px rgba(31, 51, 68, 0.08);
      }

      .accordion-trigger {
        width: 100%;
        border: 0;
        background: #fff;
        padding: 18px 16px;
        font-size: 15px;
        font-weight: 700;
        color: #1f2d3a;
        text-align: left;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: background 0.15s ease;
      }

      .accordion-trigger-label {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .accordion-trigger-icon {
        width: 22px;
        height: 22px;
        object-fit: contain;
        flex-shrink: 0;
      }

      .accordion-trigger:active {
        background: #f5f7fa;
      }

      .accordion-trigger::after {
        content: "＋";
        font-size: 20px;
        font-weight: 700;
        line-height: 1;
        color: #8a9bac;
        transition: color 0.2s ease;
      }

      .accordion-trigger[aria-expanded="true"]::after {
        content: "－";
      }

      .accordion-panel {
        padding: 0 16px 16px;
      }

      .accordion-panel[hidden] {
        display: none;
      }

      .setting-group {
        overflow: hidden;
        border: 1px solid #e4e8ed;
        border-radius: 18px;
        background: #fff;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .record-toggle {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        width: 100%;
        padding: 16px 14px;
        border: 0;
        background: #fff;
        box-shadow: none;
        box-sizing: border-box;
      }

      .record-toggle + .record-toggle {
        border-top: 1px solid #edf1f4;
      }

      .record-title {
        font-size: 14px;
        font-weight: 600;
        color: #1f2d3a;
        flex: 1 1 auto;
      }

      .record-label {
        font-size: 12px;
        font-weight: 600;
        color: #7b8a97;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 46px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background-color: #dfe5ea;
        border: 1px solid #c8d1d8;
        border-radius: 999px;
        transition: 0.2s ease;
      }

      .slider::before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 2px;
        top: 2px;
        background-color: #4b5963;
        border-radius: 50%;
        transition: 0.2s ease;
      }

      .switch input:checked + .slider {
        background-color: #b9f5c5;
      }

      .switch input:checked + .slider::before {
        transform: translateX(22px);
      }

      .placeholder-panel {
        min-height: 24px;
      }

      .language-options {
        display: grid;
        padding-top: 0;
        overflow: hidden;
        border: 1px solid #e4e8ed;
        border-radius: 18px;
        background: #fff;
      }

      .language-option {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 14px;
        color: #1f2d3a;
        border: 0;
        background: #fff;
        padding: 16px 14px;
        box-shadow: none;
      }

      .language-option + .language-option {
        border-top: 1px solid #edf1f4;
      }

      .language-option input[type="radio"] {
        width: 18px;
        height: 18px;
        margin: 0;
        accent-color: #2e9e8f;
      }

      .help-link {
        box-sizing: border-box;
        width: 100%;
        min-height: 88px;
        margin-top: 14px;
        border: 1px solid rgba(223, 230, 236, 0.95);
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 10px 26px rgba(31, 51, 68, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: flex-start;
        gap: 14px;
        text-decoration: none;
        color: #355066;
        text-align: left;
        padding: 14px 16px;
      }

      .help-link-icon {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        background: #4e8de8;
      }

      .help-link-icon img {
        width: 22px;
        height: 22px;
        object-fit: contain;
        display: block;
      }

      .help-link-body {
        display: flex;
        flex-direction: column;
        gap: 3px;
        min-width: 0;
      }

      .help-link-label {
        font-size: 15px;
        font-weight: 800;
        color: #23384b;
        line-height: 1.2;
      }

      .help-link-description {
        font-size: 12px;
        font-weight: 700;
        color: #a0acb8;
        line-height: 1.35;
      }

      .version-footer {
        margin-top: 20px;
        text-align: center;
        color: #6b7280;
        font-size: 0.82rem;
        font-family: "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      }

      #app-version {
        font-family: "Courier New", monospace;
      }

    </style>
  </head>
  <body>
    <header class="app-bar">
      <h1 class="app-bar-title">सेटिंग्स</h1>
      <div class="app-bar-actions" aria-label="ऐप मेनू">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="होम">
          <img src="../assets/buttons/map_white.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../profile/Index.html" aria-label="प्रोफ़ाइल">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link is-current" href="../otasuke/Index_hi.html" aria-label="सेटिंग्स">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>

    <main class="settings-wrap">
      <section class="settings-card" aria-label="सेटिंग्स सूची">
        <div class="accordion-item">
          <button class="accordion-trigger" type="button" aria-expanded="false" aria-controls="panel-map-display">
            <span class="accordion-trigger-label">
              <img class="accordion-trigger-icon" src="../assets/displays/map_green.png" alt="" aria-hidden="true" />
              <span>मानचित्र प्रदर्शन</span>
            </span>
          </button>
          <div id="panel-map-display" class="accordion-panel" hidden>
            <div class="setting-group">
              <div class="record-toggle" role="group" aria-label="मेरे स्पर्श मार्ग toggle">
                <span class="record-title">मेरे स्पर्श मार्ग</span>
                <span class="record-label">बंद</span>
                <label class="switch">
                  <input
                    id="setting-show-only-my-tactile"
                    type="checkbox"
                    aria-label="मेरे स्पर्श मार्ग"
                  />
                  <span class="slider"></span>
                </label>
                <span class="record-label">चालू</span>
              </div>
              <div class="record-toggle" role="group" aria-label="App tactile blocks toggle">
                <span class="record-title">ऐप से पोस्ट किए गए स्पर्श मार्ग</span>
                <span class="record-label">बंद</span>
                <label class="switch">
                  <input id="setting-show-app-tactile" type="checkbox" aria-label="ऐप से पोस्ट किए गए स्पर्श मार्ग" />
                  <span class="slider"></span>
                </label>
                <span class="record-label">चालू</span>
              </div>
              <div class="record-toggle" role="group" aria-label="OSM tactile blocks toggle">
                <span class="record-title">OSM से स्पर्श मार्ग</span>
                <span class="record-label">बंद</span>
                <label class="switch">
                  <input id="setting-show-osm-tactile" type="checkbox" aria-label="OSM से स्पर्श मार्ग" />
                  <span class="slider"></span>
                </label>
                <span class="record-label">चालू</span>
              </div>
              <div class="record-toggle" role="group" aria-label="मेरी सड़क जानकारी toggle">
                <span class="record-title">मेरी सड़क जानकारी</span>
                <span class="record-label">बंद</span>
                <label class="switch">
                  <input
                    id="setting-show-only-my-road-info"
                    type="checkbox"
                    aria-label="मेरी सड़क जानकारी"
                  />
                  <span class="slider"></span>
                </label>
                <span class="record-label">चालू</span>
              </div>
              <div class="record-toggle" role="group" aria-label="सभी सड़क जानकारी toggle">
                <span class="record-title">सभी सड़क जानकारी</span>
                <span class="record-label">बंद</span>
                <label class="switch">
                  <input
                    id="setting-show-all-road-info"
                    type="checkbox"
                    aria-label="सभी सड़क जानकारी"
                  />
                  <span class="slider"></span>
                </label>
                <span class="record-label">चालू</span>
              </div>
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <button class="accordion-trigger" type="button" aria-expanded="false" aria-controls="panel-theme">
            <span class="accordion-trigger-label">
              <img class="accordion-trigger-icon" src="../assets/displays/contrast_green.png" alt="" aria-hidden="true" />
              <span>लाइट / डार्क</span>
            </span>
          </button>
          <div id="panel-theme" class="accordion-panel placeholder-panel" hidden>
            <div class="language-options">
              <label class="language-option" for="theme-light">
                <input id="theme-light" type="radio" name="theme-mode" value="light" checked />
                <span>लाइट</span>
              </label>
              <label class="language-option" for="theme-dark">
                <input id="theme-dark" type="radio" name="theme-mode" value="dark" />
                <span>डार्क</span>
              </label>
              <label class="language-option" for="theme-system">
                <input id="theme-system" type="radio" name="theme-mode" value="system" />
                <span>डिवाइस सेटिंग का पालन करें</span>
              </label>
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <button class="accordion-trigger" type="button" aria-expanded="false" aria-controls="panel-text-size">
            <span class="accordion-trigger-label">
              <img class="accordion-trigger-icon" src="../assets/displays/textsize_green.png" alt="" aria-hidden="true" />
              <span>टेक्स्ट आकार</span>
            </span>
          </button>
          <div id="panel-text-size" class="accordion-panel placeholder-panel" hidden>
            <div class="language-options">
              <label class="language-option" for="text-size-small">
                <input id="text-size-small" type="radio" name="text-size" value="small" checked />
                <span>छोटा</span>
              </label>
              <label class="language-option" for="text-size-medium">
                <input id="text-size-medium" type="radio" name="text-size" value="medium" />
                <span>मध्यम</span>
              </label>
              <label class="language-option" for="text-size-large">
                <input id="text-size-large" type="radio" name="text-size" value="large" />
                <span>बड़ा</span>
              </label>
            </div>
          </div>
        </div>

        <div class="accordion-item">
          <button class="accordion-trigger" type="button" aria-expanded="false" aria-controls="panel-language">
            <span class="accordion-trigger-label">
              <img class="accordion-trigger-icon" src="../assets/displays/translate_green.png" alt="" aria-hidden="true" />
              <span>Language</span>
            </span>
          </button>
          <div id="panel-language" class="accordion-panel placeholder-panel" hidden>
            <div class="language-options">
              <label class="language-option" for="language-ja">
                <input id="language-ja" type="radio" name="display-language" value="ja" />
                <span>日本語</span>
              </label>
              <label class="language-option" for="language-en">
                <input id="language-en" type="radio" name="display-language" value="en" />
                <span>English</span>
              </label>
              <label class="language-option" for="language-hi">
                <input id="language-hi" type="radio" name="display-language" value="hi" />
                <span>हिंदी</span>
              </label>
            </div>
          </div>
        </div>
      </section>
      <a class="help-link" href="../help/Index_hi.html" aria-label="सहायता पेज पर जाएं">
        <span class="help-link-icon" aria-hidden="true">
          <img src="../assets/buttons/help_white.png" alt="" />
        </span>
        <span class="help-link-body">
          <span class="help-link-label">सहायता</span>
          <span class="help-link-description">उपयोग विधि और सामान्य प्रश्न</span>
        </span>
      </a>
      <footer class="version-footer">
        <span id="app-version">v1.18.4</span>
      </footer>
    </main>

    <script>
      const MAP_DISPLAY_SETTINGS_KEY = "mapDisplaySettings.v1";
      const LANGUAGE_SETTINGS_KEY = "displayLanguage.v1";
      const DEFAULT_MAP_DISPLAY_SETTINGS = {
        showAppTactile: true,
        showOsmTactile: true,
        showAllRoadInfo: true,
        showOnlyMyTactile: false,
        showOnlyMyRoadInfo: false,
      };
      const DEFAULT_LANGUAGE = "ja";
      const JA_SETTINGS_PATH = "../otasuke/Index.html";
      const EN_SETTINGS_PATH = "../otasuke/Index_en.html";
      const HI_SETTINGS_PATH = "../otasuke/Index_hi.html";

      function loadSettings() {
        try {
          const raw = localStorage.getItem(MAP_DISPLAY_SETTINGS_KEY);
          if (!raw) {
            return { ...DEFAULT_MAP_DISPLAY_SETTINGS };
          }
          const parsed = JSON.parse(raw);
          return {
            showAppTactile: Boolean(parsed && parsed.showAppTactile),
            showOsmTactile: Boolean(parsed && parsed.showOsmTactile),
            showAllRoadInfo: Boolean(parsed && parsed.showAllRoadInfo),
            showOnlyMyTactile: Boolean(parsed && parsed.showOnlyMyTactile),
            showOnlyMyRoadInfo: Boolean(parsed && parsed.showOnlyMyRoadInfo),
          };
        } catch {
          return { ...DEFAULT_MAP_DISPLAY_SETTINGS };
        }
      }

      function saveSettings(next) {
        localStorage.setItem(MAP_DISPLAY_SETTINGS_KEY, JSON.stringify(next));
      }

      function loadLanguageSetting() {
        const savedLanguage = localStorage.getItem(LANGUAGE_SETTINGS_KEY);
        return ["ja", "en", "hi"].includes(savedLanguage) ? savedLanguage : DEFAULT_LANGUAGE;
      }

      function saveLanguageSetting(language) {
        localStorage.setItem(LANGUAGE_SETTINGS_KEY, language);
      }

      const settings = loadSettings();
      const selectedLanguage = loadLanguageSetting();
      const isहिंदीPage = window.location.pathname.endsWith("/otasuke/Index_hi.html");
      if (selectedLanguage === "ja" && isहिंदीPage) {
        window.location.replace(JA_SETTINGS_PATH);
      } else if (selectedLanguage === "en") {
        window.location.replace(EN_SETTINGS_PATH);
      }
      const appTactileToggle = document.getElementById("setting-show-app-tactile");
      const osmTactileToggle = document.getElementById("setting-show-osm-tactile");
      const allRoadInfoToggle = document.getElementById("setting-show-all-road-info");
      const onlyMyTactileToggle = document.getElementById("setting-show-only-my-tactile");
      const onlyMyRoadInfoToggle = document.getElementById("setting-show-only-my-road-info");
      const languageOptions = document.querySelectorAll('input[name="display-language"]');

      appTactileToggle.checked = settings.showAppTactile;
      osmTactileToggle.checked = settings.showOsmTactile;
      allRoadInfoToggle.checked = settings.showAllRoadInfo;
      onlyMyTactileToggle.checked = settings.showOnlyMyTactile;
      onlyMyRoadInfoToggle.checked = settings.showOnlyMyRoadInfo;
      languageOptions.forEach((option) => {
        option.checked = option.value === selectedLanguage;
      });

      function handleMapDisplayToggleChange() {
        settings.showAppTactile = Boolean(appTactileToggle.checked);
        settings.showOsmTactile = Boolean(osmTactileToggle.checked);
        settings.showAllRoadInfo = Boolean(allRoadInfoToggle.checked);
        settings.showOnlyMyTactile = Boolean(onlyMyTactileToggle.checked);
        settings.showOnlyMyRoadInfo = Boolean(onlyMyRoadInfoToggle.checked);
        saveSettings(settings);
      }

      appTactileToggle.addEventListener("change", handleMapDisplayToggleChange);
      osmTactileToggle.addEventListener("change", handleMapDisplayToggleChange);
      allRoadInfoToggle.addEventListener("change", handleMapDisplayToggleChange);
      onlyMyTactileToggle.addEventListener("change", handleMapDisplayToggleChange);
      onlyMyRoadInfoToggle.addEventListener("change", handleMapDisplayToggleChange);
      languageOptions.forEach((option) => {
        option.addEventListener("change", () => {
          if (option.checked) {
            saveLanguageSetting(option.value);
            if (option.value === "en") {
              window.location.replace(EN_SETTINGS_PATH);
            } else if (option.value === "hi") {
              window.location.replace(HI_SETTINGS_PATH);
            } else {
              window.location.replace(JA_SETTINGS_PATH);
            }
          }
        });
      });

      document.querySelectorAll(".accordion-trigger").forEach((trigger) => {
        trigger.addEventListener("click", () => {
          const targetId = trigger.getAttribute("aria-controls");
          const panel = targetId ? document.getElementById(targetId) : null;
          if (!panel) {
            return;
          }
          const expanded = trigger.getAttribute("aria-expanded") === "true";
          trigger.setAttribute("aria-expanded", expanded ? "false" : "true");
          panel.hidden = expanded;
        });
      });
    </script>
    <script src="../version.js"></script>
    <script src="../config.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
