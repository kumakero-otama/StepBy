<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>サインアップ | Draggable Map</title>
    <meta name="theme-color" content="#0f766e" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="signup-profile-page">
    <main class="auth-shell signup-profile-shell">
      <section class="auth-card signup-profile-card" aria-labelledby="signup-profile-title">
        <h1 id="signup-profile-title">アカウント登録</h1>
        <p class="auth-subtitle">アカウント名とアイコン画像を設定してください。</p>

        <form id="signup-profile-form" novalidate>
          <div class="form-row signup-profile-field">
            <label for="signup-profile-username">アカウント名</label>
            <p class="signup-profile-note">プライバシー保護のため、本名は絶対に入力しないでください</p>
            <input
              id="signup-profile-username"
              name="username"
              type="text"
              maxlength="50"
              autocomplete="username"
              placeholder=""
            />
          </div>
          <div class="form-row signup-profile-field">
            <label for="signup-profile-icon">アイコン画像（任意）</label>
            <div class="signup-icon-preview-wrap">
              <img
                id="signup-profile-icon-preview"
                class="signup-icon-preview hidden"
                alt="選択したアイコン画像のプレビュー"
              />
              <label class="signup-file-button" for="signup-profile-icon">画像を選ぶ</label>
              <input id="signup-profile-icon" name="icon" type="file" accept="image/*" />
            </div>
          </div>
          <div class="agreement-row signup-profile-agreement-row">
            <label class="agreement-label" for="signup-agreement-checkbox">
              <input id="signup-agreement-checkbox" name="agreement" type="checkbox" />
              <span>
                <button id="open-user-agreement" type="button" class="agreement-link agreement-link-inline">利用規約</button>に同意します
              </span>
            </label>
          </div>
          <div class="actions">
            <button class="btn btn-primary signup-profile-submit" id="signup-profile-submit" type="submit">登録する</button>
          </div>
        </form>
        <p id="google-auth-status" class="helper-text"></p>
      </section>
      <section
        id="user-agreement-modal"
        class="agreement-modal hidden"
        role="dialog"
        aria-modal="true"
        aria-labelledby="user-agreement-title"
      >
        <div class="agreement-panel">
          <div class="agreement-header">
            <h2 id="user-agreement-title">利用規約</h2>
            <button id="close-user-agreement" type="button" class="agreement-close-btn" aria-label="閉じる">
              <img src="../assets/buttons/close.png" alt="" />
            </button>
          </div>
          <div id="user-agreement-content" class="agreement-content">読み込み中...</div>
        </div>
      </section>
    </main>
    <script src="../config.js"></script>

    <script src="../auth/token_client.js"></script>
    <script src="auth.js?v=20260228"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
