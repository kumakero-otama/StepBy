<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>Profile</title>
    <meta name="theme-color" content="#348f82" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="profile.css" />
  </head>
  <body>
    <header class="app-bar">
      <h1 class="app-bar-title">PROFILE</h1>
      <div class="app-bar-actions" aria-label="App menu">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="Home">
          <img src="../assets/buttons/home.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../profile/Index.html" aria-label="Profile">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../otasuke/Index.html" aria-label="Settings">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>

    <main class="profile-page">
      <section class="profile-card">
        <section class="profile-hero" aria-label="Profile overview">
          <div class="profile-hero-top">
            <div class="profile-avatar-wrap">
              <img
                id="profile-avatar"
                class="profile-avatar"
                src="../assets/account_default.png"
                alt="Profile icon"
              />
            </div>
          </div>

          <h2 id="profile-username" class="profile-username">username</h2>
          <div class="profile-badge-row">
            <span id="profile-pro-chip" class="pro-badge hidden">PRO</span>
          </div>
          <button id="profile-edit-btn" class="profile-edit-btn" type="button">
            <img src="../assets/buttons/edit_white.png" alt="" />
            <span>Edit profile</span>
          </button>
        </section>

        <section class="stats-row" aria-label="Achievements">
          <article class="stat-card">
            <div class="stat-label">Total tactile records</div>
            <div id="total-tactile-length" class="stat-value">0m</div>
          </article>
          <article class="stat-card">
            <div class="stat-label">Total road info posts</div>
            <div id="total-road-posts" class="stat-value">0</div>
          </article>
        </section>

        <div class="profile-wide-actions" aria-label="More actions">
          <a class="profile-wide-btn" href="../help/Index_en.html">
            <span class="profile-wide-btn-icon profile-wide-btn-icon-help" aria-hidden="true">
              <img src="../assets/buttons/help_white.png" alt="" />
            </span>
            <span class="profile-wide-btn-body">
              <span class="profile-wide-btn-label">Help</span>
              <span class="profile-wide-btn-description">How to use, FAQ, forms, etc.</span>
            </span>
          </a>
          <button id="profile-logout-btn" class="profile-wide-btn profile-wide-btn-danger" type="button">
            <span class="profile-wide-btn-icon profile-wide-btn-icon-logout" aria-hidden="true">
              <img src="../assets/buttons/logout_white.png" alt="" />
            </span>
            <span class="profile-wide-btn-body">
              <span class="profile-wide-btn-label">Log out</span>
              <span class="profile-wide-btn-description">Sign out of your account</span>
            </span>
          </button>
        </div>
      </section>
    </main>
    <script src="../config.js"></script>

    <script src="../auth/token_client.js"></script>
    <script src="profile.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
