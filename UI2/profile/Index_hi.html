<!doctype html>
<html lang="hi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>प्रोफ़ाइल</title>
    <meta name="theme-color" content="#348f82" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="profile.css" />
  </head>
  <body>
    <header class="app-bar">
      <h1 class="app-bar-title">प्रोफ़ाइल</h1>
      <div class="app-bar-actions" aria-label="ऐप मेनू">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="होम">
          <img src="../assets/buttons/home.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../profile/Index.html" aria-label="प्रोफ़ाइल">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../otasuke/Index.html" aria-label="सेटिंग्स">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>

    <main class="profile-page">
      <section class="profile-card">
        <section class="profile-hero" aria-label="प्रोफ़ाइल सारांश">
          <div class="profile-hero-top">
            <div class="profile-avatar-wrap">
              <img
                id="profile-avatar"
                class="profile-avatar"
                src="../assets/account_default.png"
                alt="प्रोफ़ाइल आइकन"
              />
            </div>
          </div>

          <h2 id="profile-username" class="profile-username">username</h2>
          <div class="profile-badge-row">
            <span id="profile-pro-chip" class="pro-badge hidden">PRO</span>
          </div>
          <button id="profile-edit-btn" class="profile-edit-btn" type="button">
            <img src="../assets/buttons/edit_white.png" alt="" />
            <span>प्रोफ़ाइल संपादित करें</span>
          </button>
        </section>

        <section class="stats-row" aria-label="उपलब्धियां">
          <article class="stat-card">
            <div class="stat-label">कुल स्पर्श मार्ग रिकॉर्ड</div>
            <div id="total-tactile-length" class="stat-value">0m</div>
          </article>
          <article class="stat-card">
            <div class="stat-label">कुल सड़क जानकारी पोस्ट</div>
            <div id="total-road-posts" class="stat-value">0</div>
          </article>
        </section>

        <div class="profile-wide-actions" aria-label="अतिरिक्त क्रियाएं">
          <a class="profile-wide-btn" href="../help/Index_hi.html">
            <span class="profile-wide-btn-icon profile-wide-btn-icon-help" aria-hidden="true">
              <img src="../assets/buttons/help_white.png" alt="" />
            </span>
            <span class="profile-wide-btn-body">
              <span class="profile-wide-btn-label">सहायता</span>
              <span class="profile-wide-btn-description">उपयोग विधि, FAQ, फ़ॉर्म आदि</span>
            </span>
          </a>
          <button id="profile-logout-btn" class="profile-wide-btn profile-wide-btn-danger" type="button">
            <span class="profile-wide-btn-icon profile-wide-btn-icon-logout" aria-hidden="true">
              <img src="../assets/buttons/logout_white.png" alt="" />
            </span>
            <span class="profile-wide-btn-body">
              <span class="profile-wide-btn-label">लॉग आउट</span>
              <span class="profile-wide-btn-description">अपने खाते से साइन आउट करें</span>
            </span>
          </button>
        </div>
      </section>
    </main>
    <script src="../config.js"></script>

    <script src="../auth/token_client.js"></script>
    <script src="profile.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
