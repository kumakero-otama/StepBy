<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>プロフィール編集</title>
    <meta name="theme-color" content="#348f82" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="edit.css" />
  </head>
  <body>
    <header class="app-bar">
      <h1 class="app-bar-title">プロフィール編集</h1>
      <div class="app-bar-actions" aria-label="アプリメニュー">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="ホーム">
          <img src="../assets/buttons/map_white.png" alt="" />
        </a>
        <a class="app-bar-icon-link is-current" href="../profile/Index.html" aria-label="プロフィール">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../otasuke/Index.html" aria-label="設定">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>

    <main class="profile-edit-page">
      <section class="profile-edit-card">
        <div class="form-card">
          <div class="form-card-title">
            <span class="form-card-icon" aria-hidden="true">
              <img src="../assets/displays/person_green.png" alt="" />
            </span>
            <span>基本情報</span>
          </div>
          <div class="form-group">
            <label class="form-label" for="profile-username-input">ユーザー名</label>
            <input id="profile-username-input" class="form-input" type="text" maxlength="50" autocomplete="nickname" />
          </div>
          <div class="pro-setting-row" role="group" aria-label="PROアカウント切り替え">
            <div class="pro-setting-copy">
              <div class="pro-toggle-title-row">
                <p class="form-label pro-toggle-label">PROアカウント</p>
                <button id="profile-pro-help-btn" class="pro-help-btn" type="button" aria-label="PROアカウントの説明">
                  <img src="../assets/buttons/help_66gray.png" alt="" />
                </button>
              </div>
            </div>
            <div class="pro-toggle-row">
              <span class="toggle-label">OFF</span>
              <label class="switch">
                <input id="profile-pro-toggle-input" type="checkbox" aria-label="PROアカウント" />
                <span class="slider"></span>
              </label>
              <span class="toggle-label">ON</span>
            </div>
          </div>
        </div>

        <div class="form-card">
          <div class="form-card-title">
            <span class="form-card-icon" aria-hidden="true">
              <img src="../assets/displays/camera_green.png" alt="" />
            </span>
            <span>アイコン画像</span>
          </div>
          <div class="icon-upload">
            <img
              id="profile-icon-preview"
              class="icon-preview"
              src="../assets/account_default.png"
              alt="現在のアイコン"
            />
            <div class="icon-action-col">
              <label class="choice-btn" for="profile-icon-camera-input">
                <img src="../assets/displays/camera_green.png" alt="" />
                <span>写真を撮影</span>
              </label>
              <label class="choice-btn" for="profile-icon-upload-input">
                <img src="../assets/displays/library_green.png" alt="" />
                <span>写真ライブラリ</span>
              </label>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="pro-help-modal" class="pro-help-modal hidden" role="dialog" aria-modal="true" aria-label="PROアカウントの説明">
      <div class="pro-help-panel">
        <button id="pro-help-close-btn" class="pro-help-close-btn" type="button" aria-label="閉じる">×</button>
        <p class="pro-help-message">
          視覚障害者を支援するプロの仕事をしている方が、点字ブロックの種類など詳細な情報を記録できるモードです。<br />
          有料プランというわけではありません。
        </p>
      </div>
    </div>

    <input id="profile-icon-camera-input" class="hidden-input" type="file" accept="image/*" capture="environment" />
    <input id="profile-icon-upload-input" class="hidden-input" type="file" accept="image/*" />

    <footer class="edit-footer">
      <button id="profile-edit-save-btn" class="footer-btn footer-btn-solid" type="button">変更を保存</button>
    </footer>
    <div id="profile-save-toast" class="save-toast" role="status" aria-live="polite">
      プロフィールの変更を保存しました！
    </div>
    <script src="../config.js"></script>

    <script src="../auth/token_client.js"></script>
    <script src="edit.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
