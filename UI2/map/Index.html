<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <script src="../language_redirect.js"></script>
    <title>Draggable Map</title>
    <meta name="theme-color" content="#222222" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="../manifest.webmanifest" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="map.css" />
  </head>
  <body>

    <div class="splash" id="splash" aria-hidden="true">
      <div class="splash-particles" id="splash-particles"></div>
      <div class="splash-logo-wrap">
        <div class="splash-logo-ring">
          <div class="splash-logo-inner">
            <img src="../assets/StepBy_icon_192.png" alt="" />
          </div>
        </div>
      </div>
      <div class="splash-title">StepBy</div>
      <div class="splash-subtitle">BARRIER-FREE MAP</div>
      <div class="splash-tagline">
        あなたの<em>一歩</em>が、<br>だれかの<em>道</em>になる。
      </div>
      <div class="splash-dots" aria-hidden="true">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>
    <header class="app-bar map-app-bar">
      <div class="map-app-bar-brand">
        <a class="map-app-bar-logo" href="../map/Index.html" aria-label="ホーム">
          <img src="../assets/StepBy_icon_192.png" alt="" />
        </a>
        <div class="map-app-bar-copy">
          <div class="map-app-bar-name">StepBy</div>
          <div class="map-app-bar-tagline">barrier-free map</div>
        </div>
      </div>
      <div class="app-bar-actions map-app-bar-actions" aria-label="アプリメニュー">
        <a class="app-bar-icon-link map-app-bar-action" href="../map/Index.html" aria-label="ホーム">
          <img src="../assets/buttons/map_white.png" alt="" />
        </a>
        <a class="app-bar-icon-link map-app-bar-action" href="../profile/Index.html" aria-label="プロフィール">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link map-app-bar-action map-app-bar-settings" href="../otasuke/Index.html" aria-label="設定">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer map-app-bar-spacer" aria-hidden="true"></div>
    <div class="map-app-bar-wave" aria-hidden="true">
      <svg viewBox="0 0 500 18" preserveAspectRatio="none">
        <path d="M0,0 C150,18 350,0 500,12 L500,18 L0,18 Z" fill="#f5f7fa"></path>
      </svg>
    </div>
    <script src="../config.js"></script>
    <script src="../auth/token_client.js"></script>
    <script>
      // 認証機能未実装の暫定対応:
      // 明示的なデバッグ遷移（?debug=1）または有効なセッションがある場合のみ表示する。
      (async () => {
        const query = new URLSearchParams(window.location.search);
        if (query.get("debug") === "1") {
          return;
        }
        try {
          const authFetch = window.AuthToken && typeof window.AuthToken.authFetch === "function"
            ? window.AuthToken.authFetch
            : fetch;
          const res = await authFetch("/auth/me");
          if (!res.ok) {
            if ((res.status === 401 || res.status === 403)
              && window.AuthToken
              && typeof window.AuthToken.clearAccessToken === "function") {
              window.AuthToken.clearAccessToken();
            }
            window.location.replace(AppPath.toApp("/auth/login.html"));
            return;
          }
          const payload = await res.json();
          if (!payload || !payload.authenticated) {
            if (window.AuthToken && typeof window.AuthToken.clearAccessToken === "function") {
              window.AuthToken.clearAccessToken();
            }
            window.location.replace(AppPath.toApp("/auth/login.html"));
          }
        } catch {
          // 一時的な通信障害ではトークンを消さず、次回の再試行余地を残す。
          window.location.replace(AppPath.toApp("/auth/login.html"));
        }
      })();
    </script>
    <main id="map-layout" class="wrap map-layout">
      <!-- 地図本体 -->
      <div class="map-row">
        <div id="map" aria-label="Map"></div>
      </div>
      <div class="record-actions" role="group" aria-label="点字ブロック記録操作">
        <button id="record-action-btn" class="record-action-btn record-main-btn" type="button" aria-pressed="false" data-start-label="記録" data-stop-label="記録終了">
          <span id="record-action-icon" class="record-action-icon record-action-icon-circle" aria-hidden="true"></span>
          <span id="record-action-text" class="record-action-text">記録</span>
        </button>
        <button
          id="pause-action-btn"
          class="record-action-btn pause-btn"
          type="button"
          disabled
          aria-disabled="true"
          data-pause-label="一時停止"
          data-resume-label="記録再開"
        >
          <span id="pause-action-icon" class="pause-icon" aria-hidden="true">
            <span class="pause-bar"></span>
            <span class="pause-bar"></span>
          </span>
          <span id="pause-action-text" class="record-action-text">一時停止</span>
        </button>
      </div>
      <!-- 共通バージョン表示 -->
      <section id="map-controls-panel" class="map-controls-panel" aria-label="地図コントロール">
        <button
          id="map-controls-handle"
          class="map-controls-handle"
          type="button"
          aria-label="地図コントロールの表示切替"
          aria-expanded="true"
        >
          <span class="map-controls-handle-label">
            <img id="map-controls-handle-icon" class="map-controls-handle-icon" src="../assets/displays/down_66gray.png" alt="" />
            <span id="map-controls-handle-label" class="map-controls-handle-text">メニューを閉じる</span>
          </span>
        </button>
        <div id="map-controls-content" class="map-controls-content">
          <div class="meta">
            <div class="meta-controls">
              <div class="meta-toggles">
                <label class="record-toggle record-toggle-card map-info-card" aria-label="地図情報表示">
                  <input id="toggle-show-map-info" class="record-toggle-input" type="checkbox" aria-label="地図情報表示" />
                  <span class="record-toggle-status" aria-hidden="true"></span>
                  <span class="record-title">地図情報表示</span>
                  <span class="record-toggle-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <path d="M12 3.5c4.7 0 8.5 3.8 8.5 8.5s-3.8 8.5-8.5 8.5-8.5-3.8-8.5-8.5 3.8-8.5 8.5-8.5Z"></path>
                      <path d="M12 3.5c2.1 2.2 3.3 5.2 3.3 8.5s-1.2 6.3-3.3 8.5m0-17c-2.1 2.2-3.3 5.2-3.3 8.5s1.2 6.3 3.3 8.5M4 12h16M6.3 7.2h11.4M6.3 16.8h11.4"></path>
                    </svg>
                  </span>
                </label>
                <label class="record-toggle record-toggle-card center-current-card" aria-label="現在地中央">
                  <input
                    id="toggle-center-current"
                    class="record-toggle-input"
                    type="checkbox"
                    aria-label="現在地中央"
                    checked
                  />
                  <span class="record-toggle-status" aria-hidden="true"></span>
                  <span class="record-title">現在地中央</span>
                  <span class="record-toggle-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                      <circle cx="12" cy="12" r="2.8"></circle>
                      <path d="M12 2.5v4.2M12 17.3v4.2M2.5 12h4.2M17.3 12h4.2"></path>
                      <circle cx="12" cy="12" r="6.3"></circle>
                    </svg>
                  </span>
                </label>
              </div>
              <div id="gps-indicator" class="gps-indicator" aria-hidden="true">
                <span class="gps-indicator-title">現在地更新</span>
                <span class="gps-indicator-icon-wrap">
                  <img src="../assets/GPS.png" alt="" />
                </span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
    <div
      id="safety-confirm-modal"
      class="safety-confirm-modal hidden"
      role="dialog"
      aria-modal="true"
      aria-labelledby="safety-confirm-title"
      aria-describedby="safety-confirm-message"
    >
      <div class="safety-confirm-panel">
        <h2 id="safety-confirm-title">安全確認</h2>
        <p id="safety-confirm-message" class="safety-confirm-message">
          このアプリを使う際は、必ず周囲の安全を確認し、車などに注意してください。<br />
          歩きスマホは決してしないでください。
        </p>
        <div class="safety-confirm-actions">
          <button id="safety-confirm-accept" class="safety-confirm-accept-btn" type="button">はい</button>
          <button id="safety-confirm-reject" class="safety-confirm-reject-btn" type="button">いいえ</button>
        </div>
      </div>
    </div>
    <div id="osm-loading-overlay" class="osm-loading-overlay hidden" aria-live="polite" aria-busy="true">
      <div class="osm-loading-spinner" aria-hidden="true"></div>
      <div class="osm-loading-text">OSMデータ取得中...</div>
    </div>
    <div id="records-loading-overlay" class="records-loading-overlay hidden" aria-live="polite" aria-busy="true">
      <div class="records-loading-spinner" aria-hidden="true"></div>
      <div class="records-loading-text">点字ブロックデータ取得中...</div>
    </div>
    <!-- 記録停止時の確認モーダル -->
    <div id="trace-confirm-modal" class="trace-confirm-modal hidden" role="dialog" aria-modal="true" aria-labelledby="trace-confirm-title">
      <div class="trace-confirm-panel">
        <h2 id="trace-confirm-title">この経路で保存しますか</h2>
        <div class="trace-confirm-scroll">
          <div id="trace-confirm-map" aria-label="保存前の経路プレビュー"></div>
          <section id="trace-tag-panel" class="trace-tag-panel hidden" aria-label="タグ選択">
            <h3 class="trace-tag-title">タグ</h3>
            <input
              id="trace-tag-search"
              class="trace-tag-search"
              type="text"
              placeholder="検索または追加..."
              enterkeyhint="done"
            />
            <div id="trace-tag-selected" class="trace-tag-selected"></div>
            <div id="trace-tag-list" class="trace-tag-list"></div>
            <div id="trace-tag-error" class="trace-tag-error hidden" role="alert" aria-live="assertive"></div>
          </section>
          <section id="trace-memo-panel" class="trace-memo-panel hidden" aria-label="ひとことメモ">
            <label class="trace-memo-title" for="trace-memo-input">ひとことメモ</label>
            <textarea
              id="trace-memo-input"
              class="trace-memo-input"
              rows="3"
              placeholder="任意でメモを入力してください"
            ></textarea>
            <p class="trace-memo-note">ひとことメモは自分にしか表示されません</p>
          </section>
        </div>
        <div class="trace-confirm-actions">
          <button id="trace-confirm-ok" class="trace-confirm-ok-btn" type="button">
            <img class="trace-confirm-ok-icon" src="../assets/displays/check_white.png" alt="" />
            <span>保存する</span>
          </button>
          <button id="trace-confirm-cancel" class="trace-confirm-cancel-btn" type="button">キャンセル</button>
        </div>
      </div>
    </div>

    <script>
      (() => {
        const splash = document.getElementById("splash");
        const particlesContainer = document.getElementById("splash-particles");
        if (!splash || !particlesContainer) {
          return;
        }

        const SPLASH_SESSION_KEY = "ui2_home_splash_seen_v1";
        let hasSeenSplash = false;
        try {
          hasSeenSplash = window.sessionStorage.getItem(SPLASH_SESSION_KEY) === "1";
        } catch {
          hasSeenSplash = false;
        }

        if (hasSeenSplash) {
          splash.remove();
          return;
        }

        try {
          window.sessionStorage.setItem(SPLASH_SESSION_KEY, "1");
        } catch {
          // ignore storage errors and keep the current display behavior
        }

        for (let i = 0; i < 20; i += 1) {
          const particle = document.createElement("div");
          particle.className = "particle";
          particle.style.left = `${Math.random() * 100}%`;
          particle.style.animationDuration = `${4 + Math.random() * 6}s`;
          particle.style.animationDelay = `${Math.random() * 5}s`;
          const size = 3 + Math.random() * 6;
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;
          particlesContainer.appendChild(particle);
        }

        const dismissSplash = () => {
          if (splash.classList.contains("fade-out")) {
            return;
          }
          splash.classList.add("fade-out");
          window.setTimeout(() => splash.remove(), 800);
        };

        window.setTimeout(dismissSplash, 3500);
        splash.addEventListener("click", dismissSplash);
      })();
    </script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="map.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
