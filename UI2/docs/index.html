<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="../language_redirect.js"></script>
    <title>Barrierfree Map API Docs</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #f5f7fb;
      }
      .topbar {
        font-family: sans-serif;
        padding: 10px 16px;
        border-bottom: 1px solid #e4e8ef;
        background: #fff;
      }
      .topbar a {
        color: #0b66c3;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      API Spec: <a href="./openapi.yaml" target="_blank" rel="noreferrer">openapi.yaml</a>
    </div>
    <div id="swagger-ui"></div>

    <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
    <script>
      window.ui = SwaggerUIBundle({
        url: "./openapi.yaml",
        dom_id: "#swagger-ui",
        deepLinking: true,
        docExpansion: "list",
        displayRequestDuration: true,
      });
    </script>
  </body>
</html>
