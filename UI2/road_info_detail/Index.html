<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="../language_redirect.js"></script>
    <title>道情報の詳細</title>
    <link rel="stylesheet" href="../appbar.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="road_info_detail.css" />
  </head>
  <body>
    <header class="app-bar">
      <h1 class="app-bar-title">道情報の詳細</h1>
      <div class="app-bar-actions" aria-label="アプリメニュー">
        <a class="app-bar-icon-link" href="../map/Index.html" aria-label="ホーム">
          <img src="../assets/buttons/home.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../profile/Index.html" aria-label="プロフィール">
          <img src="../assets/buttons/account.png" alt="" />
        </a>
        <a class="app-bar-icon-link" href="../otasuke/Index.html" aria-label="設定">
          <img src="../assets/buttons/setting.png" alt="" />
        </a>
      </div>
    </header>
    <div class="app-bar-spacer" aria-hidden="true"></div>
    <!-- 道情報詳細（タグ・投稿・画像）の表示画面 -->
    <main class="detail-wrap">
      <div class="detail-main">
        <p id="detail-error" class="detail-error hidden"></p>
        <section id="detail-content" class="detail-content hidden">
          <div class="detail-section tags-block">
            <div class="section-heading">
              <h2 class="section-label">
                <span class="section-label-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24"><path d="M10.59 2H5a3 3 0 0 0-3 3v5.59a2 2 0 0 0 .59 1.41l9.41 9.41a2 2 0 0 0 2.82 0l6.18-6.18a2 2 0 0 0 0-2.82L11.99 2.59A2 2 0 0 0 10.59 2ZM7.75 8.5A1.75 1.75 0 1 1 9.5 6.75 1.75 1.75 0 0 1 7.75 8.5Z"/></svg>
                </span>
                <span>タグ</span>
              </h2>
            </div>
            <div class="section-card">
              <ul id="tags-list" class="tags-list"></ul>
            </div>
          </div>

          <div class="detail-section">
            <div class="posts-head">
              <div class="section-heading">
                <h2 class="section-label">
                  <span class="section-label-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24"><path d="M7 4h10a3 3 0 0 1 3 3v10a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V7a3 3 0 0 1 3-3Zm0 3v10h10V7Zm2 2h6v2H9Zm0 4h4v2H9Z"/></svg>
                  </span>
                  <span>投稿</span>
                  <span id="post-count" class="post-count">(全0件)</span>
                </h2>
              </div>
            </div>
            <div id="posts-list" class="posts-list"></div>
          </div>
        </section>
        <section id="detail-loading" class="detail-loading-card">読み込み中...</section>
      </div>

      <!-- 画面下部の固定操作ボタン -->
      <div class="bottom-actions">
        <button id="post-self-btn" class="btn btn-primary" type="button">コメント追加</button>
        <button id="delete-point-btn" class="btn btn-danger hidden" type="button">削除</button>
      </div>
      <!-- 共通バージョン表示 -->
    </main>
    <div id="comment-modal" class="comment-modal hidden" role="dialog" aria-modal="true" aria-label="コメント投稿">
      <div class="comment-window">
        <div class="comment-window-head">
          <div class="comment-window-title">コメント投稿</div>
          <button id="comment-close-btn" class="comment-close-btn" type="button" aria-label="閉じる">×</button>
        </div>
        <div class="comment-window-body">
          <label class="comment-label" for="comment-body-input">本文</label>
          <textarea
            id="comment-body-input"
            class="comment-body-input"
            placeholder="ここに本文を入力してください"
          ></textarea>

          <div class="comment-label">追加タグ（任意）</div>
          <section class="comment-tag-panel" aria-label="タグ選択">
            <input
              id="comment-tag-search"
              class="comment-tag-search"
              type="text"
              placeholder="検索または追加..."
              enterkeyhint="done"
            />
            <div id="comment-tag-selected" class="comment-tag-selected"></div>
            <div id="comment-tag-list" class="comment-tag-list"></div>
            <div class="comment-complete-tag-wrap">
              <button
                id="comment-complete-tag-btn"
                class="comment-complete-tag-btn"
                type="button"
                data-tag-id="complete"
                data-confirm-message="このタグがついた道情報は非表示になります。よろしいですか"
              >
                完了タグ
              </button>
            </div>
          </section>

          <div class="comment-label">画像アップロード</div>
          <div class="comment-upload-buttons">
            <button id="comment-photo-library-btn" class="btn" type="button">写真ライブラリ</button>
            <button id="comment-camera-btn" class="btn" type="button">カメラで撮影</button>
          </div>
          <div id="comment-image-preview" class="comment-image-preview">
            <div class="comment-image-empty">選択された画像がここに表示されます</div>
          </div>

          <input
            id="comment-photo-library-input"
            class="comment-file-input-hidden"
            type="file"
            accept="image/*"
            multiple
          />
          <input
            id="comment-camera-input"
            class="comment-file-input-hidden"
            type="file"
            accept="image/*"
            capture="environment"
          />
        </div>
        <div class="comment-window-foot">
          <button id="comment-submit-btn" class="btn btn-primary" type="button">投稿</button>
        </div>
      </div>
    </div>
    <div id="comment-submit-loading" class="comment-submit-loading hidden" aria-live="polite" aria-busy="true">
      <div class="comment-submit-text">コメント投稿中...</div>
      <div class="comment-submit-spinner" aria-hidden="true"></div>
    </div>
    <div id="comment-result-modal" class="comment-result-modal hidden" role="dialog" aria-modal="true" aria-label="コメント投稿結果">
      <div class="comment-result-panel">
        <p id="comment-result-message" class="comment-result-message"></p>
        <div class="comment-result-actions">
          <button id="comment-result-ok-btn" class="btn" type="button">OK</button>
        </div>
      </div>
    </div>
    <script src="../config.js"></script>
    <script src="../auth/token_client.js"></script>
    <script src="road_info_detail.js"></script>
    <script src="../pwa.js"></script>
  </body>
</html>
